<style>
/* ============================================================
   LUZTUBE v5 — GLOBAL STYLES
   ============================================================ */
:root {
  --dt-primary: #E50914;
  --dt-primary-dark: #B20710;
  --dt-primary-glow: rgba(229,9,20,0.4);
  --dt-secondary: #FF6B35;
  --dt-accent: #FFD700;
  --dt-bg: #0A0A0A;
  --dt-bg2: #141414;
  --dt-bg3: #1F1F1F;
  --dt-bg4: #2A2A2A;
  --dt-surface: #1A1A1A;
  --dt-surface2: #242424;
  --dt-border: rgba(255,255,255,0.08);
  --dt-border2: rgba(255,255,255,0.15);
  --dt-text: #FFFFFF;
  --dt-text2: #B3B3B3;
  --dt-text3: #737373;
  --dt-success: #46D369;
  --dt-warning: #FB923C;
  --dt-info: #3B82F6;
  --dt-card-radius: 10px;
  --dt-font: 'DM Sans', sans-serif;
  --dt-font-display: 'Bebas Neue', sans-serif;
  --dt-sidebar-w: 240px;
  --dt-transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --dt-thumb-size: 200px;
  --dt-zoom: 1;
  --dt-blur-intensity: 0px;
  --dt-glow: none;
  --dt-card-shadow: none;
  --dt-bg-image: none;
  --dt-sidebar-bg: var(--dt-bg2);
}

/* ───────────── THEMES ───────────── */
.theme-light {
  --dt-bg:#F5F5F5; --dt-bg2:#FFFFFF; --dt-bg3:#EBEBEB; --dt-bg4:#E0E0E0;
  --dt-surface:#FFFFFF; --dt-surface2:#F0F0F0;
  --dt-border:rgba(0,0,0,0.08); --dt-border2:rgba(0,0,0,0.15);
  --dt-text:#0F0F0F; --dt-text2:#606060; --dt-text3:#909090;
  --dt-sidebar-bg:#FFFFFF;
}
.theme-oled {
  --dt-bg:#000000; --dt-bg2:#050505; --dt-bg3:#101010; --dt-bg4:#1A1A1A;
  --dt-surface:#0A0A0A; --dt-surface2:#111;
  --dt-sidebar-bg:#050505;
}
.theme-netflix {
  --dt-primary:#E50914; --dt-bg:#0A0A0A; --dt-bg2:#141414;
  --dt-bg3:#1F1F1F; --dt-surface:#1A1A1A; --dt-sidebar-bg:#141414;
}
.theme-synthwave {
  --dt-primary:#FF2D78; --dt-secondary:#7B2FFF; --dt-accent:#00F5FF;
  --dt-bg:#0D0221; --dt-bg2:#150333; --dt-bg3:#1F0A40; --dt-bg4:#2A1060;
  --dt-surface:#1A0530; --dt-text:#FFFFFF; --dt-text2:#C8A8FF;
  --dt-sidebar-bg:#150333;
}
.theme-vaporwave {
  --dt-primary:#FF6EC7; --dt-secondary:#5CFFD8; --dt-accent:#B45AFF;
  --dt-bg:#1A0A2E; --dt-bg2:#241240; --dt-bg3:#301850; --dt-bg4:#3D2060;
  --dt-surface:#2A1540; --dt-text:#FFD6F5; --dt-text2:#E0A0FF;
  --dt-sidebar-bg:#241240;
}
.theme-minimal {
  --dt-primary:#333333; --dt-bg:#FAFAFA; --dt-bg2:#F0F0F0; --dt-bg3:#E8E8E8;
  --dt-bg4:#DEDEDE; --dt-surface:#FFFFFF; --dt-text:#111111;
  --dt-text2:#555; --dt-text3:#999; --dt-border:rgba(0,0,0,0.06);
  --dt-border2:rgba(0,0,0,0.12); --dt-sidebar-bg:#F0F0F0;
}
.theme-glassmorphism {
  --dt-bg:rgba(10,10,30,0.95); --dt-bg2:rgba(255,255,255,0.05);
  --dt-bg3:rgba(255,255,255,0.08); --dt-bg4:rgba(255,255,255,0.12);
  --dt-surface:rgba(255,255,255,0.07); --dt-border:rgba(255,255,255,0.12);
  --dt-border2:rgba(255,255,255,0.22); --dt-blur-intensity:16px;
  --dt-sidebar-bg:rgba(255,255,255,0.05);
}
.theme-retro {
  --dt-primary:#FF7F00; --dt-secondary:#00C896; --dt-accent:#FFE000;
  --dt-bg:#1A0A00; --dt-bg2:#2A1500; --dt-bg3:#3A2000; --dt-bg4:#4A2D00;
  --dt-surface:#2A1500; --dt-font:'Courier New',monospace;
  --dt-sidebar-bg:#2A1500;
}
.theme-cyberpunk {
  --dt-primary:#FFE600; --dt-secondary:#FF2079; --dt-accent:#00FFDD;
  --dt-bg:#0A0010; --dt-bg2:#100018; --dt-bg3:#1A0028; --dt-bg4:#220035;
  --dt-surface:#140020; --dt-text:#FFFFFF; --dt-text2:#E0CCFF;
  --dt-sidebar-bg:#100018;
}
.theme-kids {
  --dt-primary:#FF4081; --dt-secondary:#00BCD4; --dt-accent:#FFEB3B;
  --dt-bg:#FFF9F0; --dt-bg2:#FFFFFF; --dt-bg3:#FFF0E6; --dt-bg4:#FFE4CC;
  --dt-surface:#FFFFFF; --dt-text:#2D2D2D; --dt-text2:#666;
  --dt-card-radius:20px; --dt-font:'Nunito',sans-serif;
  --dt-sidebar-bg:#FFFFFF;
}

/* ───────────── GLOW EFFECTS ───────────── */
.effects-glow .dt-nav-item.active { box-shadow: 0 0 12px var(--dt-primary-glow); }
.effects-glow .btn-primary { box-shadow: 0 0 16px var(--dt-primary-glow); }
.effects-glow .vid-card:hover .vid-thumb { box-shadow: 0 0 24px var(--dt-primary-glow); }

/* ───────────── SHADOW EFFECTS ───────────── */
.effects-shadows .dt-card, .effects-shadows .vid-card { box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
.effects-shadows .dt-modal { box-shadow: 0 20px 60px rgba(0,0,0,0.7); }

/* ───────────── ANIMATIONS TOGGLE ───────────── */
.no-animations *, .no-animations *::before, .no-animations *::after {
  animation-duration: 0s !important;
  transition-duration: 0s !important;
}

/* ───────────── KIDS MODE ───────────── */
.kids-mode .dt-nav-item { font-size: 16px; padding: 14px 16px; }
.kids-mode .vid-card { border-radius: 20px; }
.kids-mode .btn { font-size: 16px; padding: 12px 24px; border-radius: 16px; }
.kids-mode .dt-topbar { min-height: 72px; }
.kids-mode .admin-section, .kids-mode .api-section { display: none; }

/* ═══ BASE ═══ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--dt-font);
  background: var(--dt-bg);
  color: var(--dt-text);
  overflow-x: hidden;
  min-height: 100vh;
  zoom: var(--dt-zoom);
  background-image: var(--dt-bg-image);
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
}
input,select,textarea,button { font-family: inherit; }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dt-bg2); }
::-webkit-scrollbar-thumb { background: var(--dt-bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dt-text3); }

/* ═══ SIDEBAR ═══ */
.dt-sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--dt-sidebar-w);
  background: var(--dt-sidebar-bg);
  backdrop-filter: blur(var(--dt-blur-intensity));
  border-right: 1px solid var(--dt-border);
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform var(--dt-transition), width var(--dt-transition);
  overflow-y: auto; overflow-x: hidden;
}
.dt-sidebar.collapsed { width: 68px; }
.dt-sidebar.mobile-open { transform: translateX(0) !important; }
.dt-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 16px;
  border-bottom: 1px solid var(--dt-border);
  min-height: 64px; overflow: hidden;
}
.dt-logo-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--dt-primary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 18px; color: white;
}
.dt-logo-text {
  font-family: var(--dt-font-display);
  font-size: 28px; letter-spacing: 1px;
  color: var(--dt-primary); white-space: nowrap;
}
.dt-nav { flex: 1; padding: 12px 8px; }
.dt-nav-section { margin-bottom: 24px; }
.dt-nav-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--dt-text3);
  padding: 0 8px; margin-bottom: 6px; white-space: nowrap; overflow: hidden;
}
.dt-nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 8px;
  cursor: pointer; transition: background var(--dt-transition);
  color: var(--dt-text2); font-size: 14px; font-weight: 400;
  white-space: nowrap; overflow: hidden; position: relative;
}
.dt-nav-item:hover { background: var(--dt-bg3); color: var(--dt-text); }
.dt-nav-item.active { background: rgba(229,9,20,0.15); color: var(--dt-primary); font-weight: 500; }
.dt-nav-icon { font-size: 20px; flex-shrink: 0; width: 22px; text-align: center; }
.dt-nav-badge {
  margin-left: auto; background: var(--dt-primary);
  color: white; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 999px;
}

/* ═══ TOPBAR ═══ */
.dt-topbar {
  position: fixed; top: 0; right: 0;
  left: var(--dt-sidebar-w); height: 64px;
  background: var(--dt-sidebar-bg);
  backdrop-filter: blur(var(--dt-blur-intensity));
  border-bottom: 1px solid var(--dt-border);
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; z-index: 90;
  transition: left var(--dt-transition);
}
.dt-topbar.sidebar-collapsed { left: 68px; }
.dt-search-wrap { flex: 1; max-width: 520px; display: flex; align-items: center; }
.dt-search-input {
  flex: 1; height: 40px;
  background: var(--dt-bg3); border: 1px solid var(--dt-border2);
  border-right: none; border-radius: 20px 0 0 20px;
  padding: 0 16px; color: var(--dt-text); font-size: 14px; outline: none;
  transition: border-color var(--dt-transition);
}
.dt-search-input:focus { border-color: var(--dt-primary); }
.dt-search-btn {
  height: 40px; width: 56px; background: var(--dt-bg4);
  border: 1px solid var(--dt-border2);
  border-radius: 0 20px 20px 0;
  cursor: pointer; color: var(--dt-text); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--dt-transition);
}
.dt-search-btn:hover { background: var(--dt-primary); }
.dt-topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.dt-icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: transparent; border: none;
  cursor: pointer; color: var(--dt-text2); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--dt-transition), color var(--dt-transition);
  position: relative;
}
.dt-icon-btn:hover { background: var(--dt-bg3); color: var(--dt-text); }

/* ═══ MAIN ═══ */
.dt-main {
  margin-left: var(--dt-sidebar-w);
  padding-top: 64px; min-height: 100vh;
  transition: margin-left var(--dt-transition);
}
.dt-main.sidebar-collapsed { margin-left: 68px; }
.dt-page { padding: 28px 24px; max-width: 1600px; }

/* ═══ BUTTONS ═══ */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px; border-radius: 8px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  border: none; transition: all var(--dt-transition); white-space: nowrap;
}
.btn-primary { background: var(--dt-primary); color: white; }
.btn-primary:hover { background: var(--dt-primary-dark); transform: translateY(-1px); }
.btn-secondary { background: var(--dt-bg3); color: var(--dt-text); border: 1px solid var(--dt-border2); }
.btn-secondary:hover { background: var(--dt-bg4); }
.btn-ghost { background: transparent; color: var(--dt-text2); }
.btn-ghost:hover { background: var(--dt-bg3); color: var(--dt-text); }
.btn-danger { background: transparent; color: #EF4444; border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-success { background: rgba(70,211,105,0.15); color: var(--dt-success); border: 1px solid rgba(70,211,105,0.3); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
.btn-icon { padding: 8px; border-radius: 8px; }

/* ═══ CARDS ═══ */
.dt-card {
  background: var(--dt-surface);
  backdrop-filter: blur(var(--dt-blur-intensity));
  border: 1px solid var(--dt-border);
  border-radius: var(--dt-card-radius); overflow: hidden;
}
.dt-card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--dt-border);
  display: flex; align-items: center; gap: 12px;
}
.dt-card-title { font-size: 16px; font-weight: 600; flex: 1; }
.dt-card-body { padding: 20px; }

/* ═══ VIDEO GRID ═══ */
.vid-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--dt-thumb-size), 1fr));
  gap: 20px;
}
.layout-list .vid-grid { grid-template-columns: 1fr; }
.layout-list .vid-card { display: flex; gap: 16px; }
.layout-list .vid-thumb { width: 200px; flex-shrink: 0; margin-bottom: 0; aspect-ratio: 16/9; }
.layout-compact .vid-grid { gap: 10px; }
.layout-cinematic { --dt-thumb-size: 320px; }
.layout-cinematic .vid-grid { grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 24px; }

.vid-card { cursor: pointer; transition: transform var(--dt-transition); }
.vid-card:hover { transform: translateY(-3px); }
.vid-card:hover .vid-thumb-inner { transform: scale(1.04); }
.vid-thumb {
  aspect-ratio: 16/9; border-radius: 8px;
  overflow: hidden; background: var(--dt-bg3);
  position: relative; margin-bottom: 10px;
}
.vid-thumb-inner {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.vid-duration {
  position: absolute; bottom: 6px; right: 6px;
  background: rgba(0,0,0,0.85); color: white;
  font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
}
.vid-info { padding: 0 2px; }
.vid-title {
  font-size: 14px; font-weight: 500; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
  color: var(--dt-text); margin-bottom: 5px;
}
.vid-meta { font-size: 12px; color: var(--dt-text3); }
.vid-channel { color: var(--dt-text2); font-size: 12px; font-weight: 500; margin-bottom: 2px; }

/* ═══ SKELETON ═══ */
@keyframes shimmer { 0%{background-position:-1000px 0} 100%{background-position:1000px 0} }
.skeleton {
  background: linear-gradient(90deg,var(--dt-bg3) 25%,var(--dt-bg4) 50%,var(--dt-bg3) 75%);
  background-size: 2000px 100%; animation: shimmer 1.8s infinite linear; border-radius: 6px;
}

/* ═══ MODAL ═══ */
.dt-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 16px; animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity:0; } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes slideUp { from { transform:translateY(20px); opacity:0; } }
@keyframes slideInRight { from { transform:translateX(100%); opacity:0; } }
.dt-modal {
  background: var(--dt-bg2);
  backdrop-filter: blur(var(--dt-blur-intensity));
  border: 1px solid var(--dt-border2);
  border-radius: 14px; max-width: 680px; width: 100%;
  max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease;
}
.dt-modal-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--dt-border);
  display: flex; align-items: center; gap: 12px;
}
.dt-modal-title { font-size: 18px; font-weight: 600; flex: 1; }
.dt-modal-body { padding: 24px; }
.dt-modal-footer {
  padding: 16px 24px; border-top: 1px solid var(--dt-border);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* ═══ FORMS ═══ */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: var(--dt-text2); margin-bottom: 6px; }
.form-control {
  width: 100%; padding: 10px 14px;
  background: var(--dt-bg3); border: 1px solid var(--dt-border2);
  border-radius: 8px; color: var(--dt-text); font-size: 14px;
  outline: none; transition: border-color var(--dt-transition);
}
.form-control:focus { border-color: var(--dt-primary); }
.form-select {
  width: 100%; padding: 10px 14px;
  background: var(--dt-bg3); border: 1px solid var(--dt-border2);
  border-radius: 8px; color: var(--dt-text); font-size: 14px;
  outline: none; cursor: pointer; transition: border-color var(--dt-transition);
}
.form-range { width: 100%; accent-color: var(--dt-primary); }
.pw-wrap { position: relative; }
.pw-wrap .form-control { padding-right: 44px; }
.pw-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--dt-text3); font-size: 16px;
}

/* ═══ BADGES ═══ */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
}
.badge-red { background: rgba(229,9,20,0.2); color: #FF6B6B; }
.badge-green { background: rgba(70,211,105,0.2); color: var(--dt-success); }
.badge-blue { background: rgba(59,130,246,0.2); color: var(--dt-info); }
.badge-yellow { background: rgba(255,215,0,0.2); color: var(--dt-accent); }
.badge-gray { background: var(--dt-bg3); color: var(--dt-text2); }

/* ═══ TABS ═══ */
.dt-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--dt-border); margin-bottom: 24px; flex-wrap: wrap; }
.dt-tab {
  padding: 10px 18px; font-size: 14px; font-weight: 500;
  cursor: pointer; color: var(--dt-text3);
  border-bottom: 2px solid transparent; transition: all var(--dt-transition);
}
.dt-tab:hover { color: var(--dt-text); }
.dt-tab.active { color: var(--dt-primary); border-bottom-color: var(--dt-primary); }

/* ═══ STATS ═══ */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: var(--dt-surface); border: 1px solid var(--dt-border);
  border-radius: var(--dt-card-radius); padding: 18px 16px;
}
.stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--dt-text3); margin-bottom: 8px; }
.stat-value { font-size: 26px; font-weight: 700; color: var(--dt-text); }
.stat-sub { font-size: 11px; color: var(--dt-text3); margin-top: 4px; }

/* ═══ PLAYER ═══ */
.player-wrap {
  background: #000; border-radius: 12px; overflow: hidden; position: relative;
}
.player-wrap iframe, .player-wrap video { width: 100%; aspect-ratio: 16/9; display: block; border: none; }

/* ═══ HERO ═══ */
.hero-banner {
  border-radius: 14px; overflow: hidden; position: relative;
  margin-bottom: 32px; background: linear-gradient(135deg,var(--dt-bg3) 0%,var(--dt-bg2) 100%);
  min-height: 220px; display: flex; align-items: flex-end;
}
.hero-bg { position: absolute; inset: 0; object-fit: cover; width: 100%; height: 100%; opacity: 0.4; }
.hero-gradient { position: absolute; inset: 0; background: linear-gradient(to right,rgba(0,0,0,0.95) 30%,rgba(0,0,0,0.3) 100%); }
.hero-content { position: relative; z-index: 1; padding: 28px 32px; }
.hero-category { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dt-primary); margin-bottom: 8px; }

      const payload = _pendingSave;
      _pendingSave = null;
      _saveQueue = _saveQueue.then(() =>
        fetch(SERVER_DATA_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        }).catch(() => { _serverAvailable = false; })
      );
    }, 800);
  },
};

// ═══════════════════════════════════════════════
// INDEXED DB HELPER — for large binary data
// ═══════════════════════════════════════════════
const idb = {
  _db: null,
  _ready: null,

  async open() {
    if (this._ready) return this._ready;
    this._ready = new Promise((resolve, reject) => {
      const req = indexedDB.open("LuzTubeDB", 2);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("avatars")) db.createObjectStore("avatars");
        if (!db.objectStoreNames.contains("wallpapers")) db.createObjectStore("wallpapers");
        if (!db.objectStoreNames.contains("fonts")) db.createObjectStore("fonts");
      };
      req.onsuccess = (e) => { this._db = e.target.result; resolve(); };
      req.onerror = () => reject(req.error);
    });
    return this._ready;
  },

  async get(store, key) {
    await this.open();
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(store, "readonly");
      const req = tx.objectStore(store).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },

  async set(store, key, val) {
    await this.open();
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(store, "readwrite");
      const req = tx.objectStore(store).put(val, key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  },

  async del(store, key) {
    await this.open();
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(store, "readwrite");
      const req = tx.objectStore(store).delete(key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  },

  async keys(store) {
    await this.open();
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(store, "readonly");
      const req = tx.objectStore(store).getAllKeys();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },
};

// ═══════════════════════════════════════════════
// IMAGE PROCESSING UTILITY (cross-device)
// ═══════════════════════════════════════════════
// Soporta HEIC/HEIF (iOS), EXIF orientation (mobile),
// WebP con fallback a PNG, validación de tamaño,
// y todos los modos/modos de wallpaper
const processImage = async (file, opts = {}) => {
  const {
    maxSize,
    width = null, height = null,
    mode = "cover",
    quality = 0.85,
    blur = 0, darken = 0, brightness = 100, saturation = 100,
  } = opts;

  const MAX_BYTES = 50 * 1024 * 1024;
  if (file.size > MAX_BYTES) {
    throw new Error(`Imagen muy grande (${(file.size / 1024 / 1024).toFixed(1)}MB). Máximo 50MB.`);
  }

  const canvasToBlob = (c, fmt, q) => new Promise(r => {
    c.toBlob(b => { if (b) { r(b); return; } if (fmt === "image/webp") c.toBlob(r, "image/png"); else r(null); }, fmt, q);
  });
  const blobToURL = b => new Promise(r => { const fr = new FileReader(); fr.onloadend = () => r(fr.result); fr.readAsDataURL(b); });

  let img, cleanupURL;
  try {
    const bitmap = await createImageBitmap(file);
    img = { w: bitmap.width, h: bitmap.height, draw: (ctx, ...a) => ctx.drawImage(bitmap, ...a) };
  } catch {
    const url = URL.createObjectURL(file);
    cleanupURL = url;
    try {
      img = await new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve({ w: image.width, h: image.height, draw: (ctx, ...a) => ctx.drawImage(image, ...a) });
        image.onerror = () => reject(new Error("Formato no soportado (prueba con JPEG/PNG)"));
        image.src = url;
      });
    } finally { if (cleanupURL) URL.revokeObjectURL(cleanupURL); }
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const iw = img.w, ih = img.h;

  if (maxSize) {
    const s = Math.min(iw, ih, maxSize);
    canvas.width = s; canvas.height = s;
  } else if (width && height) {
    canvas.width = width; canvas.height = height;
  } else {
    canvas.width = iw; canvas.height = ih;
  }

  const cw = canvas.width, ch = canvas.height;

  if (maxSize) {
    const s = Math.min(iw, ih);
    img.draw(ctx, (iw - s) / 2, (ih - s) / 2, s, s, 0, 0, cw, ch);
  } else if (mode === "tile") {
    let tw = iw, th = ih;
    if (tw > 1920 || th > 1080) { const sc = Math.min(1920 / tw, 1080 / th); tw = Math.round(tw * sc); th = Math.round(th * sc); }
    canvas.width = tw; canvas.height = th;
    img.draw(ctx, 0, 0, iw, ih, 0, 0, tw, th);
  } else {
    let sw = iw, sh = ih, dx = 0, dy = 0;
    if (mode === "cover") { const sc = Math.max(cw / iw, ch / ih); sw = iw * sc; sh = ih * sc; dx = (cw - sw) / 2; dy = (ch - sh) / 2; }
    else if (mode === "contain") { const sc = Math.min(cw / iw, ch / ih); sw = iw * sc; sh = ih * sc; dx = (cw - sw) / 2; dy = (ch - sh) / 2; }
    else { sw = cw; sh = ch; }
    img.draw(ctx, dx, dy, sw, sh);
  }

  if (blur > 0 || brightness !== 100 || saturation !== 100 || darken > 0) {
    const temp = document.createElement("canvas"); temp.width = cw; temp.height = ch;
    const tc = temp.getContext("2d");
    tc.filter = `blur(${blur}px) brightness(${brightness}%) saturate(${saturation}%)`;
    tc.drawImage(canvas, 0, 0);
    tc.filter = "none";
    if (darken > 0) { tc.fillStyle = `rgba(0,0,0,${darken / 100})`; tc.fillRect(0, 0, cw, ch); }
    ctx.clearRect(0, 0, cw, ch);
    ctx.drawImage(temp, 0, 0);
  }

  const blob = await canvasToBlob(canvas, "image/webp", quality);
  if (!blob) throw new Error("No se pudo procesar la imagen");
  return await blobToURL(blob);
};

const avatarProcessor = {
  async process(file) { return processImage(file, { maxSize: 256, quality: 0.85 }); },

  getInitialAvatar(name, color) {
    const canvas = document.createElement("canvas");
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = color || "#E50914";
    ctx.beginPath(); ctx.arc(64, 64, 64, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 56px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText((name || "?")[0].toUpperCase(), 64, 64);
    return canvas.toDataURL("image/webp", 0.9);
  },
};

const wallpaperProcessor = {
  async process(file, opts = {}) {
    const { mode = "cover", blur = 0, darken = 0, brightness = 100, saturation = 100 } = opts;
    const dataUrl = await processImage(file, { width: 1920, height: 1080, mode, quality: 0.82, blur, darken, brightness, saturation });
    return { dataUrl, mode, blur, darken, brightness, saturation };
  },
};

// ═══════════════════════════════════════════════
// FONT MANAGER
// ═══════════════════════════════════════════════
const fontManager = {
  async install(file) {
    const ext = file.name.split(".").pop().toLowerCase();
    if (!["ttf", "otf", "woff", "woff2"].includes(ext)) throw new Error("Formato no soportado. Usá TTF, OTF, WOFF o WOFF2.");
    const dataUrl = await new Promise((resolve) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.readAsDataURL(file);
    });
    const fontFace = new FontFace(file.name.replace(/\.[^.]+$/, ""), `url(${dataUrl})`);
    await fontFace.load();
    document.fonts.add(fontFace);
    const font = {
      id: uid(),
      name: file.name.replace(/\.[^.]+$/, ""),
      fullName: file.name,
      ext,
      size: file.size,
      dataUrl,
      installedAt: new Date().toISOString(),
      active: true,
    };
    const existing = await idb.get("fonts", "installed") || [];
    existing.push(font);
    await idb.set("fonts", "installed", existing);
    return font;
  },

  async list() {
    return (await idb.get("fonts", "installed")) || [];
  },

  async toggle(id) {
    const list = await this.list();
    const font = list.find((f) => f.id === id);
    if (!font) return;
    font.active = !font.active;
    if (font.active) {
      const ff = new FontFace(font.name, `url(${font.dataUrl})`);
      await ff.load();
      document.fonts.add(ff);
    }
    await idb.set("fonts", "installed", list);
  },

  async remove(id) {
    let list = await this.list();
    list = list.filter((f) => f.id !== id);
    await idb.set("fonts", "installed", list);
  },

  async getFontNames() {
    const list = await this.list();
    return list.filter((f) => f.active).map((f) => f.name);
  },
};

// ═══════════════════════════════════════════════
// PROFILE MANAGER
// ═══════════════════════════════════════════════
const profileManager = {
  _profiles: [],
  _activeId: null,
  _listeners: [],

  onChange(fn) { this._listeners.push(fn); return () => { this._listeners = this._listeners.filter(l => l !== fn); }; },
  _notify() { this._listeners.forEach(fn => fn(this._profiles, this._activeId)); },

  async init(serverData) {
    const fromServer = serverData?.lt_profiles;
    const fromLocal = storage.get("lt_profiles", null);
    this._profiles = fromServer || fromLocal || [];
    this._activeId = storage.get("lt_active_profile", null);
    if (this._profiles.length === 0) {
      await this._migrateFromLegacy(serverData);
    }
    if (this._profiles.length > 0 && !this._profiles.find(p => p.id === this._activeId)) {
      this._activeId = this._profiles[0].id;
      storage.set("lt_active_profile", this._activeId);
    }
    this._notify();
    this._persist();
  },

  async _migrateFromLegacy(serverData) {
    const oldHistory = serverData?.lt_history || storage.get("lt_history", []);
    const oldFavorites = serverData?.lt_favorites || storage.get("lt_favorites", []);
    const oldConfig = serverData?.lt_config || storage.get("lt_config", {});
    if (oldHistory.length === 0 && oldFavorites.length === 0 && Object.keys(oldConfig).length === 0) {
      this._profiles = [];
      this._activeId = null;
      this._notify();
      return;
    }
    const profile = {
      ...DEFAULT_PROFILE,
      id: uid(),
      name: "Principal",
      description: "Perfil migrado automáticamente",
      color: "#E50914",
      createdAt: new Date().toISOString(),
      history: oldHistory,
      favorites: oldFavorites,
      config: oldConfig,
    };
    this._profiles = [profile];
    this._activeId = profile.id;
    storage.set("lt_active_profile", this._activeId);
    storage.del("lt_history");
    storage.del("lt_favorites");
    this._notify();
    this._persist();
  },

  getProfiles() { return [...this._profiles]; },
  getActive() { return this._profiles.find(p => p.id === this._activeId) || null; },
  getActiveId() { return this._activeId; },

  create(data) {
    const profile = {
      ...DEFAULT_PROFILE,
      ...data,
      id: uid(),
      createdAt: new Date().toISOString(),
      stats: { ...DEFAULT_PROFILE.stats },
    };
    this._profiles.push(profile);
    this._activeId = profile.id;
    storage.set("lt_active_profile", this._activeId);
    this._notify();
    this._persist();
    return profile;
  },

  update(id, data) {
    const idx = this._profiles.findIndex(p => p.id === id);
    if (idx === -1) return;
    this._profiles[idx] = { ...this._profiles[idx], ...data };
    this._notify();
    this._persist();
  },

  remove(id) {
    this._profiles = this._profiles.filter(p => p.id !== id);
    if (this._activeId === id) {
      this._activeId = this._profiles.length > 0 ? this._profiles[0].id : null;
      storage.set("lt_active_profile", this._activeId || "");
    }
    this._notify();
    this._persist();
  },

  switchTo(id) {
    if (this._profiles.find(p => p.id === id)) {
      this._activeId = id;
      storage.set("lt_active_profile", id);
      this._notify();
    }
  },

  getProfileData(id, key) {
    const p = this._profiles.find(p => p.id === id);
    return p ? p[key] : null;
  },

  setProfileData(id, key, val) {
    const idx = this._profiles.findIndex(p => p.id === id);
    if (idx === -1) return;
    this._profiles[idx][key] = val;
    this._notify();
    this._persist();
  },

  _persist() {
    const data = this._profiles.map(p => ({
      ...p,
      avatar: null,
    }));
    storage.set("lt_profiles", data);
    serverStorage.save("lt_profiles", data);
  },

  async saveAvatar(profileId, dataUrl) {
    await idb.set("avatars", profileId, dataUrl);
    const idx = this._profiles.findIndex(p => p.id === profileId);
    if (idx !== -1) this._profiles[idx].avatar = `idb:${profileId}`;
    this._notify();
  },

  async getAvatar(profileId) {
    const p = this._profiles.find(p => p.id === profileId);
    if (!p) return null;
    if (p.avatar && p.avatar.startsWith("idb:")) {
      return await idb.get("avatars", profileId);
    }
    return p.avatar || null;
  },

  async saveWallpaper(profileId, wallpaperData) {
    await idb.set("wallpapers", profileId, wallpaperData);
    this.update(profileId, { wallpaper: `idb:${profileId}` });
  },

  async getWallpaper(profileId) {
    const p = this._profiles.find(p => p.id === profileId);
    if (!p || !p.wallpaper) return null;
    if (p.wallpaper.startsWith("idb:")) {
      return await idb.get("wallpapers", profileId);
    }
    return p.wallpaper;
  },

  getMergedConfig(profileId) {
    const p = this._profiles.find(p => p.id === profileId);
    const global = storage.get("lt_config", DEFAULT_CONFIG);
    return p ? { ...global, ...p.config } : global;
  },
};

// ═══════════════════════════════════════════════
// STATS TRACKER
// ═══════════════════════════════════════════════
const statsTracker = {
  _sessionStart: null,

  startSession() { this._sessionStart = Date.now(); },

  async track(profileId, type, data = {}) {
    const p = profileManager.getProfiles().find(pr => pr.id === profileId);
    if (!p) return;
    const stats = p.stats || { ...DEFAULT_PROFILE.stats };
    switch (type) {
      case "watch":
        stats.videosWatched = (stats.videosWatched || 0) + 1;
        if (data.channelId && !stats.channelsWatched.includes(data.channelId)) {
          stats.channelsWatched.push(data.channelId);
        }
        if (data.category && !stats.categoriesWatched.includes(data.category)) {
          stats.categoriesWatched.push(data.category);
        }
        if (data.duration) stats.totalWatchTime = (stats.totalWatchTime || 0) + data.duration;
        break;
      case "search":
        stats.searches = (stats.searches || 0) + 1;
        break;
      case "session_end":
        if (this._sessionStart) {
          stats.sessions = (stats.sessions || 0) + 1;
          this._sessionStart = null;
        }
        break;
    }
    p.stats = stats;
    profileManager._notify();
    profileManager._persist();
  },
};

// ═══════════════════════════════════════════════
// DATA MIGRATION MANAGER
// ═══════════════════════════════════════════════
const migrationManager = {
  async run(serverData) {
    let migrated = false;
    const version = storage.get("lt_data_version", 0);
    if (version < 1) {
      if (serverData?.lt_history || storage.get("lt_history", []).length > 0) {
        await profileManager._migrateFromLegacy(serverData);
        migrated = true;
      }
      storage.set("lt_data_version", 1);
    }
    if (version < 2) {
      storage.set("lt_data_version", 2);
      migrated = true;
    }
    if (migrated) {
      await activityLogger.log("data_migration", { fromVersion: version, toVersion: storage.get("lt_data_version", 1) });
    }
    return migrated;
  },
};

// VIDEO ID HELPER
// ═══════════════════════════════════════════════
function getVideoId(video) {
  if (!video) return null;
  const rid = video?.snippet?.resourceId?.videoId;
  if (rid && /^[\w-]{6,20}$/.test(rid)) return rid;
  const idVid = video?.id?.videoId;
  if (idVid && /^[\w-]{6,20}$/.test(idVid)) return idVid;
  const idStr = video?.id;
  if (typeof idStr === 'string' && /^[\w-]{6,20}$/.test(idStr)) return idStr;
  return null;
}

// ═══════════════════════════════════════════════
// YOUTUBE API SERVICE
// ═══════════════════════════════════════════════
const ytAPI = {
  async getVideos(channelId, apiKey, maxResults=8, pageToken=null) {
    if (!apiKey || apiKey===YOUTUBE_API_KEY_PLACEHOLDER) return null;
    try {
      const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails,snippet&id=${channelId}&key=${apiKey}`);
      const chData = await chRes.json();
      if (chData.error) return { error: chData.error.message };
      if (!chData.items?.length) return null;
      const uploadList = chData.items[0].contentDetails.relatedPlaylists.uploads;
      const thumb = chData.items[0].snippet?.thumbnails?.default?.url||"";
      const tokenParam = pageToken?`&pageToken=${pageToken}`:'';
      const plRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadList}&maxResults=${maxResults}${tokenParam}&key=${apiKey}`);
      const plData = await plRes.json();
      return { videos: plData.items||[], channelThumb: thumb, nextPageToken: plData.nextPageToken||null, uploadPlaylistId: uploadList };
    } catch(e) { return null; }
  },
  async getMoreVideos(uploadPlaylistId, apiKey, maxResults=12, pageToken) {
    if (!apiKey||!pageToken) return null;
    try {
      const plRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadPlaylistId}&maxResults=${maxResults}&pageToken=${pageToken}&key=${apiKey}`);
      const plData = await plRes.json();
      return { videos: plData.items||[], nextPageToken: plData.nextPageToken||null };
    } catch(e) { return null; }
  },
  async searchInChannel(channelId, query, apiKey) {
    if (!apiKey||apiKey===YOUTUBE_API_KEY_PLACEHOLDER) return [];
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&q=${encodeURIComponent(query)}&type=video&maxResults=10&key=${apiKey}`);
      const data = await res.json();
      return data.items||[];
    } catch(e){ return []; }
  },
  async resolveChannel(input, apiKey) {
    if (!apiKey||apiKey===YOUTUBE_API_KEY_PLACEHOLDER) return null;
    const clean = input.trim();
    try {
      if (/^UC[\w-]{20,}$/.test(clean)) {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${clean}&key=${apiKey}`);
        const data = await res.json();
        if (data.error) return { error: data.error.message };
        if (data.items?.length) {
          const ch = data.items[0];
          return { id:ch.id, name:ch.snippet.title, thumbnail:ch.snippet.thumbnails?.default?.url||'' };
        }
        return null;
      }
      const handle = clean.startsWith('@')?clean:'@'+clean;
      const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&forHandle=${encodeURIComponent(handle)}&key=${apiKey}`);
      const data = await res.json();
      if (data.error) return { error: data.error.message };
      if (data.items?.length) {
        const ch = data.items[0];
        return { id:ch.id, name:ch.snippet.title, thumbnail:ch.snippet.thumbnails?.default?.url||'' };
      }
      return null;
    } catch(e) { return null; }
  },
  async validateKey(apiKey) {
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/videoCategories?part=snippet&regionCode=US&key=${apiKey}`);
      const data = await res.json();
      if (data.error) return { valid:false, message:data.error.message };
      return { valid:true };
    } catch(e) { return { valid:false, message:'Error de red' }; }
  },
};

// ═══════════════════════════════════════════════
// YOUTUBE PLAYER — controles personalizados sin enlaces a YouTube
// ═══════════════════════════════════════════════
function YoutubePlayer({ videoId, title, fsRef }) {
  const playerRef = useRef(null);
  const containerRef = useRef(null);
  const progressRef = useRef(null);
  const [ready, setReady] = useState(false);
  const [playing, setPlaying] = useState(false);
  const [t, setT] = useState(0);
  const [d, setD] = useState(0);
  const [vol, setVol] = useState(() => { try { return parseInt(localStorage.getItem('lt_vol')) || 100; } catch { return 100; } });
  const [muted, setMuted] = useState(false);
  const [showUI, setShowUI] = useState(true);
  const hideTimer = useRef(null);

  useEffect(() => {
    let player = null, interval = null;
    const init = () => {
      if (!containerRef.current || !window.YT?.Player) return;
      player = new YT.Player(containerRef.current, {
        width: '100%', height: '100%', videoId,
        host: 'https://www.youtube-nocookie.com',
        playerVars: { autoplay: 1, controls: 0, modestbranding: 1, rel: 0, playsinline: 1, iv_load_policy: 3, fs: 0, cc_load_policy: 0, origin: window.location.origin },
        events: {
          onReady: () => { playerRef.current = player; setReady(true); setD(player.getDuration()); player.setVolume(vol); },
          onStateChange: (e) => { setPlaying(e.data === YT.PlayerState.PLAYING); },
        },
      });
      interval = setInterval(() => { if (player?.getCurrentTime) setT(player.getCurrentTime()); }, 250);
    };
    if (window.YT?.Player) { init(); } else {
      const prev = window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady = () => { if (prev) prev(); init(); };
      if (!window.YT) { const s = document.createElement('script'); s.src = 'https://www.youtube.com/iframe_api'; document.head.appendChild(s); }
    }
    return () => { clearInterval(interval); if (player?.destroy) player.destroy(); };
  }, [videoId]);

  const fmt = (s) => { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s / 60); const x = Math.floor(s % 60); return `${m}:${x.toString().padStart(2, '0')}`; };

  const showTemp = () => { setShowUI(true); clearTimeout(hideTimer.current); hideTimer.current = setTimeout(() => setShowUI(false), 3000); };

  const p = playerRef.current;

  return (
    <div ref={fsRef} style={{position:'relative',width:'100%',aspectRatio:'16/9',background:'#000',borderRadius:8,overflow:'hidden'}}
      onMouseMove={showTemp} onMouseEnter={() => { clearTimeout(hideTimer.current); setShowUI(true); }}
      onMouseLeave={() => setShowUI(false)}>
      <div ref={containerRef} style={{width:'100%',height:'100%',pointerEvents:'none'}} />
      {showUI && ready && <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(transparent,rgba(0,0,0,0.85))',padding:'6px 10px',zIndex:20,userSelect:'none'}}>
        <div ref={progressRef} onClick={e => { if (p) { const r = progressRef.current.getBoundingClientRect(); p.seekTo(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)) * d, true); } }} style={{width:'100%',height:6,background:'rgba(255,255,255,0.15)',borderRadius:3,marginBottom:5,cursor:'pointer',position:'relative',transition:'height 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.height='8px'} onMouseLeave={e=>e.currentTarget.style.height='6px'}>
          <div style={{width:`${d ? (t/d)*100 : 0}%`,height:'100%',background:'var(--dt-primary)',borderRadius:3,position:'relative',transition:'width 0.1s'}}>
            <div style={{position:'absolute',right:-5,top:'50%',transform:'translateY(-50%)',width:10,height:10,borderRadius:'50%',background:'var(--dt-primary)',boxShadow:'0 0 4px rgba(0,0,0,0.5)'}} />
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation(); if(p) playing ? p.pauseVideo() : p.playVideo();}} style={{background:'none',border:'none',color:'#fff',fontSize:20,cursor:'pointer',padding:0,width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center'}}>{playing ? '⏸' : '▶'}</button>
          <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation(); if(p) p.seekTo(Math.max(0, t - 10), true);}} style={{background:'none',border:'none',color:'rgba(255,255,255,0.8)',fontSize:14,cursor:'pointer',padding:0,width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',opacity:0.7}} title="-10s">⏪</button>
          <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation(); if(p) p.seekTo(Math.min(d, t + 10), true);}} style={{background:'none',border:'none',color:'rgba(255,255,255,0.8)',fontSize:14,cursor:'pointer',padding:0,width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',opacity:0.7}} title="+10s">⏩</button>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.7)',fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap',minWidth:72}}>{fmt(t)} / {fmt(d)}</span>
          <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation(); if(p) muted ? (p.unMute(), setMuted(false)) : (p.mute(), setMuted(true));}} style={{background:'none',border:'none',color:'#fff',fontSize:13,cursor:'pointer',padding:0}}>
            {muted||vol===0 ? '🔇' : vol < 50 ? '🔉' : '🔊'}
          </button>
          <input type="range" min={0} max={100} value={muted ? 0 : vol} onMouseDown={e=>e.stopPropagation()} onChange={e=>{const v=parseInt(e.target.value); setVol(v); if(p) p.setVolume(v); try{localStorage.setItem('lt_vol',v)}catch{} if(v>0&&muted){setMuted(false);if(p)p.unMute();}}} style={{width:60,height:3,cursor:'pointer',accentColor:'var(--dt-primary)'}} />
          <div style={{flex:1}} />
          <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation(); const w=fsRef?.current||containerRef.current?.parentElement; if(w) document.fullscreenElement ? document.exitFullscreen() : w.requestFullscreen();}} style={{background:'none',border:'none',color:'#fff',cursor:'pointer',padding:0,width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',opacity:0.8}} title="Pantalla completa">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
          </button>
        </div>
      </div>}
      {!playing && ready && <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:40,color:'rgba(255,255,255,0.7)',pointerEvents:'none',zIndex:5,textShadow:'0 2px 12px rgba(0,0,0,0.6)'}}>▶</div>}
    </div>
  );
}

// HOME PAGE
// ═══════════════════════════════════════════════
function HomePage() {
  const ctx = useContext(AppContext);
  const { whitelist, config, favorites, toggleFavorite, addHistory } = ctx;
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeCategory, setActiveCategory] = useState('Todos');
  const [playingVideo, setPlayingVideo] = useState(null);
  const [playingIdx, setPlayingIdx] = useState(-1);

  const enabledChannels = useMemo(()=>whitelist.filter(ch=>ch.enabled).sort((a,b)=>b.score-a.score||a.priority-b.priority),[whitelist]);

  useEffect(()=>{
    setLoading(true);
    const key = config.youtubeApiKey||apiKeyStore.get();
    if (!key||key===YOUTUBE_API_KEY_PLACEHOLDER) {
      const all = enabledChannels.flatMap(ch=>mockVideos(ch,4+Math.min(ch.score,6)));
      all.sort(()=>Math.random()-0.5);
      setVideos(all); setLoading(false); return;
    }
    const chWithId=enabledChannels.filter(ch=>ch.id&&/^UC[\w-]{20,}$/.test(ch.id));
    const chHandleOnly=enabledChannels.filter(ch=>!ch.id||!/^UC[\w-]{20,}$/.test(ch.id));
    const mockFallback=chHandleOnly.flatMap(ch=>mockVideos(ch,3));
    if(!chWithId.length){ setVideos(mockFallback); setLoading(false); return; }
    Promise.all(chWithId.map(ch=>ytAPI.getVideos(ch.id,key,6))).then(results=>{
      const all=[...mockFallback];
      results.forEach((r,i)=>{ if(r?.videos) r.videos.forEach(v=>all.push({...v,_channelScore:chWithId[i].score,_channelThumb:r.channelThumb})); });
      all.sort((a,b)=>(b._channelScore||0)-(a._channelScore||0));
      setVideos(all); setLoading(false);
    });
  },[enabledChannels,config.youtubeApiKey]);

  const categories = useMemo(()=>['Todos',...new Set(enabledChannels.map(ch=>ch.category))],[enabledChannels]);
  const filtered = useMemo(()=>{
    if(activeCategory==='Todos') return videos;
    const catIds = new Set(enabledChannels.filter(ch=>ch.category===activeCategory).map(ch=>ch.id));
    return videos.filter(v=>catIds.has(v.snippet?.channelId));
  },[videos,activeCategory,enabledChannels]);

  const hero = filtered[0];
  const playVideo=(v,idx)=>{setPlayingVideo(v);setPlayingIdx(idx);};
  const playNext=()=>{ const ni=playingIdx+1; if(ni<filtered.length){setPlayingVideo(filtered[ni]);setPlayingIdx(ni);} };

  if (!enabledChannels.length) return (
    <div className="dt-page">
      <div className="empty-state">
        <div className="empty-icon">📺</div>
        <div className="empty-title">No hay canales aprobados</div>
        <div className="empty-sub">Agrega canales en el Panel Admin para comenzar</div>
      </div>
    </div>
  );

  const layoutClass = `layout-${config.feedLayout||'grid'}`;

  return (
    <div className={`dt-page ${layoutClass}`}>
      {hero&&!loading&&(
        <div className="hero-banner" style={{cursor:'pointer'}} onClick={()=>playVideo(hero,0)}>
          <img className="hero-bg" src={hero.snippet?.thumbnails?.maxres?.url||hero.snippet?.thumbnails?.medium?.url} alt="" onError={e=>{e.target.style.display='none';}}/>
          <div className="hero-gradient"/>
          <div className="hero-content">
            <div className="hero-category">📺 {hero.snippet?.channelTitle}</div>
            <div className="hero-title">{hero.snippet?.title}</div>
            <div className="hero-meta">{new Date(hero.snippet?.publishedAt||Date.now()).toLocaleDateString('es-AR',{year:'numeric',month:'long',day:'numeric'})}</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-primary">▶ Reproducir</button>
              <button className="btn btn-secondary" onClick={e=>{e.stopPropagation();toggleFavorite(hero);}}>
                {favorites.find(f=>getVideoId(f)===getVideoId(hero))?'★ Favorito':'☆ Agregar'}
              </button>
            </div>
          </div>
        </div>
      )}
      <div className="pill-tabs">
        {categories.map(cat=><div key={cat} className={`pill-tab ${activeCategory===cat?'active':''}`} onClick={()=>setActiveCategory(cat)}>{cat}</div>)}
      </div>
      <div className="section-header">
        <div className="section-dot"/>
        <div className="section-title">{activeCategory==='Todos'?'Videos Recientes':activeCategory}</div>
        <span className="text-dim" style={{fontSize:13}}>{filtered.length} videos</span>
      </div>
      {loading?<VideoSkeleton count={8}/>:(
        filtered.length===0?<div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-title">Sin videos</div></div>:(
          <div className="vid-grid">
            {filtered.slice(1).map((v,i)=>(
              <VideoCard key={getVideoId(v)||i} video={v} onClick={()=>playVideo(v,i+1)}
                isFavorite={!!favorites.find(f=>getVideoId(f)===getVideoId(v))}
                onToggleFavorite={toggleFavorite}/>
            ))}
          </div>
        )
      )}
      {playingVideo&&<PlayerModal video={playingVideo} onClose={()=>setPlayingVideo(null)} onNext={playNext} onHistory={addHistory}/>}
    </div>
  );
}

// SEARCH PAGE
// ═══════════════════════════════════════════════
function SearchPage({ query }) {
  const ctx = useContext(AppContext);
  const { whitelist, config, favorites, toggleFavorite, addHistory } = ctx;
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [playingVideo, setPlayingVideo] = useState(null);
  const enabledChannels = whitelist.filter(ch=>ch.enabled);

  useEffect(()=>{
    if(!query) return;
    setLoading(true);
    const q=query.toLowerCase();
    const key=config.youtubeApiKey||apiKeyStore.get();
    if(!key||key===YOUTUBE_API_KEY_PLACEHOLDER) {
      const all=enabledChannels.flatMap(ch=>mockVideos(ch,8));
      setResults(all.filter(v=>v.snippet.title.toLowerCase().includes(q)||v.snippet.channelTitle.toLowerCase().includes(q)));
      setLoading(false); return;
    }
    const chIds=enabledChannels.filter(ch=>ch.id&&/^UC[\w-]{20,}$/.test(ch.id));
    if(!chIds.length){setResults([]);setLoading(false);return;}
    Promise.all(chIds.map(ch=>ytAPI.searchInChannel(ch.id,query,key))).then(r=>{ setResults(r.flat()); setLoading(false); });
  },[query]);

  return (
    <div className="dt-page">
      <div className="section-header" style={{marginBottom:20}}>
        <div className="section-dot"/>
        <div className="section-title">Resultados para "{query}"</div>
        {!loading&&<span className="text-dim" style={{fontSize:13}}>{results.length} resultados</span>}
      </div>
      <div style={{marginBottom:16,padding:'10px 14px',background:'rgba(70,211,105,0.08)',border:'1px solid rgba(70,211,105,0.2)',borderRadius:8,fontSize:13,color:'var(--dt-success)'}}>
        🔒 Búsqueda limitada a {enabledChannels.length} canales aprobados
      </div>
      {loading?<VideoSkeleton count={6}/>:results.length===0?(
        <div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-title">Sin resultados</div><div className="empty-sub">No se encontraron videos para "{query}"</div></div>
      ):(
        <div className="vid-grid">
          {results.map((v,i)=>(
            <VideoCard key={i} video={v} onClick={()=>setPlayingVideo(v)}
              isFavorite={!!favorites.find(f=>getVideoId(f)===getVideoId(v))}
              onToggleFavorite={toggleFavorite}/>
          ))}
        </div>
      )}
      {playingVideo&&<PlayerModal video={playingVideo} onClose={()=>setPlayingVideo(null)} onHistory={addHistory}/>}
    </div>
  );
}

      setVideos(shortChannels.flatMap(ch=>mockVideos(ch,4).map(v=>({...v,_isShort:true})))); setLoading(false); return;

    Promise.all(shortChannels.map(ch=>ytAPI.getVideos(ch.id,key,6))).then(results=>{
      setVideos(results.flatMap((r,i)=>r?.videos?.map(v=>({...v,_channelName:shortChannels[i].name}))||[]));

// API KEY PAGE — independent of admin
// ═══════════════════════════════════════════════
function ApiPage() {
  const { config, setConfig, showToast, whitelist, setWhitelist } = useContext(AppContext);
  const [inputKey, setInputKey] = useState(()=>apiKeyStore.get()||'');
  const [show, setShow] = useState(false);
  const [validating, setValidating] = useState(false);
  const [status, setStatus] = useState(()=>{
    const k=apiKeyStore.get();
    return (k&&k!==YOUTUBE_API_KEY_PLACEHOLDER)?'saved':'empty';
  });
  const [importing, setImporting] = useState(false);
  const [importProgress, setImportProgress] = useState({done:0,total:0,errors:0});

  const sanitize=(s)=>s.replace(/[<>"'`]/g,'').trim();

  const importPresetChannels=async(apiKey)=>{
    setImporting(true);
    const source=DEFAULT_WHITELIST.filter(ch=>ch.handle);
    setImportProgress({done:0,total:source.length,errors:0});
    const resolved=[];
    let errors=0;
    for(let i=0;i<source.length;i++){
      const preset=source[i];
      const result=await ytAPI.resolveChannel(preset.handle,apiKey);
      if(result&&result.id){
        resolved.push({
          id:result.id,
          handle:preset.handle,
          name:result.name||preset.name,
          category:preset.category,
          score:preset.score,
          priority:preset.priority,
          enabled:true,
          shorts:preset.shorts,
          description:'',
          thumbnail:result.thumbnail||'',
        });
      } else { errors++; }
      setImportProgress({done:i+1,total:source.length,errors});
    }
    setWhitelist(prev=>{
      // Build map of resolved channels by id
      const resolvedById=new Map(resolved.map(c=>[c.id,c]));
      // Build map of resolved channels by handle (for updating handle-only entries)
      const resolvedByHandle=new Map(resolved.map(c=>[c.handle?.toLowerCase(),(c)]));
      return prev.map(c=>{
        // Already has a valid UC id → keep as-is (don't overwrite with re-import)
        if(c.id&&/^UC[\w-]{20,}$/.test(c.id)) return c;
        // Try to match by handle
        const r=resolvedByHandle.get((c.handle||'').toLowerCase());
        if(r) return {...c,id:r.id,name:r.name||c.name,thumbnail:r.thumbnail||c.thumbnail};
        return c;
      });
    });
    setImporting(false);
    showToast(`\u2713 ${resolved.length} canales importados${errors?` (${errors} no encontrados)`:''}`, resolved.length>0?'success':'error');
  };

  const validate=async()=>{
    const k=sanitize(inputKey);
    if(!k){ showToast('Ingresá una API Key','error'); return; }
    setValidating(true); setStatus('validating');
    const result=await ytAPI.validateKey(k);
    setValidating(false);
    if(result.valid){
      apiKeyStore.set(k);
      setConfig(prev=>({...prev,youtubeApiKey:k}));
      setStatus('valid');
      showToast('\u2713 API Key válida — importando canales...','success');
      await importPresetChannels(k);
    } else {
      setStatus('invalid');
      showToast(`API Key inválida: ${result.message}`,'error');
    }
  };

  const clear=()=>{
    setInputKey(''); apiKeyStore.del();
    setConfig(prev=>({...prev,youtubeApiKey:''}));
    setStatus('empty');
    showToast('API Key eliminada. Modo demo activo.','info');
  };

  const statusBanners={
    valid:{ bg:'rgba(70,211,105,0.1)', border:'rgba(70,211,105,0.3)', color:'var(--dt-success)', text:'✓ API Key válida — Videos cargando desde YouTube', dot:'ok' },
    saved:{ bg:'rgba(70,211,105,0.1)', border:'rgba(70,211,105,0.3)', color:'var(--dt-success)', text:'✓ API Key configurada — Revalidá si dejó de funcionar', dot:'ok' },
    invalid:{ bg:'rgba(229,9,20,0.1)', border:'rgba(229,9,20,0.3)', color:'#FF6B6B', text:'✗ API Key inválida — Verificá que esté bien escrita y que YT Data API v3 esté habilitada', dot:'bad' },
    validating:{ bg:'rgba(59,130,246,0.1)', border:'rgba(59,130,246,0.3)', color:'var(--dt-info)', text:'⏳ Validando con YouTube...', dot:'unknown' },
    empty: null,
  };
  const banner=statusBanners[status];

  return (
    <div className="dt-page api-section">
      <div className="section-header" style={{marginBottom:28}}>
        <div className="section-dot"/>
        <div className="section-title">🔑 Conexión YouTube</div>
        {banner&&<div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:banner.color}}><span className={`api-dot api-dot-${banner.dot}`}/>{status==='valid'||status==='saved'?'Conectada':'Sin conexión'}</div>}
      </div>

      <div style={{maxWidth:640}}>
        <div style={{background:'rgba(59,130,246,0.08)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:12,padding:'18px 20px',marginBottom:28}}>
          <div style={{fontWeight:600,marginBottom:10,color:'var(--dt-info)'}}>📌 Cómo obtener tu API Key de YouTube</div>
          <ol style={{fontSize:13,color:'var(--dt-text2)',lineHeight:2.2,paddingLeft:18}}>
            <li>Ve a <a href="https://console.cloud.google.com" target="_blank" style={{color:'var(--dt-info)'}}>Google Cloud Console</a></li>
            <li>Crea un proyecto nuevo</li>
            <li>Habilita "YouTube Data API v3"</li>
            <li>Ve a Credenciales → Crear credencial → API Key</li>
            <li>Copia la key y pégala abajo</li>
          </ol>
          <div style={{marginTop:8,padding:'8px 12px',background:'rgba(251,146,60,0.1)',border:'1px solid rgba(251,146,60,0.2)',borderRadius:8,fontSize:12,color:'var(--dt-warning)'}}>
            ⚠️ La cuota gratuita es de 10.000 unidades/día. La app la usa de forma eficiente.
          </div>
        </div>

        <div className="dt-card">
          <div className="dt-card-header">
            <div className="dt-card-title">YouTube Data API v3 Key</div>
          </div>
          <div className="dt-card-body">
            <div className="form-group">
              <label className="form-label">Tu API Key</label>
              <div style={{display:'flex',gap:8}}>
                <div className="pw-wrap" style={{flex:1}}>
                  <input
                    className="form-control"
                    type={show?'text':'password'}
                    placeholder="AIzaSy..."
                    value={inputKey}
                    onChange={e=>{setInputKey(e.target.value);if(status==='valid'||status==='invalid')setStatus('empty');}}
                    autoComplete="off"
                  />
                  <button className="pw-toggle" onClick={()=>setShow(s=>!s)}>{show?'🙈':'👁'}</button>
                </div>
                <button className="btn btn-primary" onClick={validate} disabled={validating||importing} style={{whiteSpace:'nowrap'}}>
                  {validating?'⏳ Validando...':importing?'⏳ Importando...':' ✓ Validar y Guardar'}
                </button>
                {apiKeyStore.get()&&<button className="btn btn-danger" onClick={clear} title="Eliminar key">✕</button>}
              </div>
              <div style={{fontSize:11,color:'var(--dt-text3)',marginTop:6}}>Sin API Key la app funciona en modo demo con datos de muestra.</div>
            </div>
            {banner&&(
              <div style={{background:banner.bg,border:`1px solid ${banner.border}`,borderRadius:8,padding:'10px 16px',fontSize:13,color:banner.color,display:'flex',alignItems:'center',gap:8}}>
                <span className={`api-dot api-dot-${banner.dot}`}/>
                {banner.text}
              </div>
            )}
            {importing&&(
              <div style={{marginTop:16,background:'rgba(59,130,246,0.08)',border:'1px solid rgba(59,130,246,0.25)',borderRadius:10,padding:'14px 18px'}}>
                <div style={{fontWeight:600,fontSize:13,color:'var(--dt-info)',marginBottom:10}}>
                  ⏳ Importando canales preconfigurados... {importProgress.done}/{importProgress.total}
                </div>
                <div style={{height:6,background:'var(--dt-bg4)',borderRadius:3,overflow:'hidden',marginBottom:8}}>
                  <div style={{height:'100%',background:'var(--dt-info)',borderRadius:3,transition:'width 0.3s ease',width:`${importProgress.total?Math.round(importProgress.done/importProgress.total*100):0}%`}}/>
                </div>
                <div style={{fontSize:12,color:'var(--dt-text3)'}}>
                  {importProgress.done} resueltos{importProgress.errors>0?` · ${importProgress.errors} errores`:''} — Este proceso puede tardar unos segundos
                </div>
              </div>
            )}
            {!importing&&(status==='valid'||status==='saved')&&whitelist.some(c=>!['UCVHFbw7woebKtHnopGmQFZg','UCbmNph6atAoGfqLoCL_duAg','UCZdQjaSoLjIzFnWsDQOv4ww','UCsXVk37bltHxD1rDPwtNM8Q','UCnUYZLuoy1rq1aVMwx4aTzw'].includes(c.id))&&(
              <div style={{marginTop:12,background:'rgba(70,211,105,0.08)',border:'1px solid rgba(70,211,105,0.25)',borderRadius:10,padding:'12px 16px',fontSize:13,color:'var(--dt-success)'}}>
                ✅ {whitelist.length} canales en la lista — los preconfigurados ya están cargados
              </div>
            )}
          </div>
        </div>

        <div className="dt-card" style={{marginTop:20}}>
          <div className="dt-card-header">
            <div className="dt-card-title">📺 {DEFAULT_WHITELIST.length} Canales Preconfigurados</div>
          </div>
          <div className="dt-card-body">
            <div style={{fontSize:13,color:'var(--dt-text2)',marginBottom:12}}>
              Al validar tu API Key, estos canales se añaden automáticamente a tu lista. Podés habilitarlos/deshabilitarlos desde el Panel Admin.
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {PRESET_CHANNELS.map(ch=>(
                <span key={ch.handle} style={{padding:'4px 10px',background:'var(--dt-bg3)',border:'1px solid var(--dt-border)',borderRadius:999,fontSize:12,color:'var(--dt-text2)'}}>
                  {ch.name}
                </span>
              ))}
            </div>
            {(status==='valid'||status==='saved')&&!importing&&(
              <button
                className="btn btn-secondary"
                style={{marginTop:14}}
                onClick={()=>importPresetChannels(apiKeyStore.get())}
              >
                🔄 Resolver todos los canales ({whitelist.filter(ch=>!ch.id||!/^UC[\w-]{20,}$/.test(ch.id)).length} sin ID)
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ADMIN LOGIN — no session persistence, brute force protection
// ═══════════════════════════════════════════════
function AdminLogin({ onLogin }) {
  const [pw, setPw] = useState('');
  const [show, setShow] = useState(false);
  const [error, setError] = useState('');
  const [attempts, setAttempts] = useState(0);
  const [lockUntil, setLockUntil] = useState(null);
  const [countdown, setCountdown] = useState(0);

  useEffect(()=>{
    if (!lockUntil) return;
    const iv = setInterval(()=>{
      const rem = Math.ceil((lockUntil-Date.now())/1000);
      if (rem<=0){ setLockUntil(null); setAttempts(0); setCountdown(0); clearInterval(iv); }
      else setCountdown(rem);
    },500);
    return()=>clearInterval(iv);
  },[lockUntil]);

  const attempt=()=>{
    if (lockUntil&&Date.now()<lockUntil) return;
    const sanitized = pw.replace(/[<>"'`]/g,'').trim();
    if (sanitized===auth.getPassword()) {
      onLogin(); setError(''); setAttempts(0);
    } else {
      const newAttempts=attempts+1;
      setAttempts(newAttempts);
      setPw('');
      if (newAttempts>=MAX_LOGIN_ATTEMPTS) {
        const until=Date.now()+LOCKOUT_SECONDS*1000;
        setLockUntil(until); setCountdown(LOCKOUT_SECONDS);
        setError('');
      } else {
        setError(`Contraseña incorrecta. Intento ${newAttempts}/${MAX_LOGIN_ATTEMPTS}.`);
      }
    }
  };

  const isLocked = lockUntil&&Date.now()<lockUntil;

  return (
    <div className="login-screen">
      <div className="login-card">
        <div style={{fontSize:48,marginBottom:12}}>🔐</div>
        <div style={{fontFamily:'var(--dt-font-display)',fontSize:32,color:'var(--dt-primary)',marginBottom:6}}>PANEL ADMIN</div>
        <div style={{fontSize:14,color:'var(--dt-text3)',marginBottom:24}}>Acceso restringido · LuzTube</div>

        {isLocked&&(
          <div className="lockout-bar">
            🔒 Demasiados intentos fallidos. Espera {countdown} segundos.
            <div style={{marginTop:6,height:4,background:'var(--dt-bg4)',borderRadius:2}}>
              <div style={{height:'100%',background:'var(--dt-warning)',borderRadius:2,transition:'width 1s linear',width:`${(countdown/LOCKOUT_SECONDS)*100}%`}}/>
            </div>
          </div>
        )}

        <div className="form-group pw-wrap" style={{marginBottom:8}}>
          <input
            className="form-control"
            type={show?'text':'password'}
            placeholder="Contraseña de administrador"
            value={pw}
            onChange={e=>{setPw(e.target.value);setError('');}}
            onKeyDown={e=>{if(e.key==='Enter')attempt();}}
            autoComplete="off"
            disabled={isLocked}
            style={{paddingRight:44}}
          />
          <button className="pw-toggle" onClick={()=>setShow(s=>!s)} disabled={isLocked}>{show?'🙈':'👁'}</button>
        </div>
        {error&&<div style={{color:'var(--dt-primary)',fontSize:13,marginBottom:12,textAlign:'left'}}>{error}</div>}
        <button className="btn btn-primary w-full" onClick={attempt} disabled={isLocked}>
          {isLocked?`Bloqueado (${countdown}s)`:'Acceder al Panel'}
        </button>
        <div style={{fontSize:11,color:'var(--dt-text3)',marginTop:16}}>La sesión no persiste al cerrar la app.</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// ADMIN WHITELIST
// ═══════════════════════════════════════════════
function AdminWhitelist() {
  const { whitelist, setWhitelist, showToast, config } = useContext(AppContext);
  const [search, setSearch] = useState('');
  const [editCh, setEditCh] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newCh, setNewCh] = useState({id:'',name:'',category:'Educación',score:5,priority:3,enabled:true,shorts:false,description:''});
  const [handleInput, setHandleInput] = useState('');
  const [resolving, setResolving] = useState(false);
  const [resolveError, setResolveError] = useState('');

  const filteredList = whitelist.filter(ch=>!search||ch.name.toLowerCase().includes(search.toLowerCase())||ch.category.toLowerCase().includes(search.toLowerCase()));

  const resolveHandle=async()=>{
    if(!handleInput.trim()) return;
    const apiKey=apiKeyStore.get();
    if(!apiKey){
      if(/^UC[\w-]{20,}$/.test(handleInput.trim())){ setNewCh(prev=>({...prev,id:handleInput.trim()})); setResolveError(''); showToast('ID cargado. Completa el nombre manualmente.','info'); }
      else setResolveError('Sin API Key, ingresá el ID directo (UCxxxxxxx...).');
      return;
    }
    setResolving(true); setResolveError('');
    const result=await ytAPI.resolveChannel(handleInput.trim(),apiKey);
    setResolving(false);
    if(!result){setResolveError('Canal no encontrado.');return;}
    if(result.error){setResolveError(`Error: ${result.error}`);return;}
    if(whitelist.find(c=>c.id===result.id)){setResolveError('Canal ya en la whitelist.');return;}
    setNewCh(prev=>({...prev,id:result.id,name:result.name,thumbnail:result.thumbnail||''}));
    setResolveError(''); showToast(`Canal encontrado: ${result.name}`,'success');
  };

  const addChannel=()=>{
    if(!newCh.id||!newCh.name){showToast('Completa ID y nombre','error');return;}
    if(whitelist.find(c=>c.id===newCh.id)){showToast('Canal ya existe','error');return;}
    setWhitelist([...whitelist,{...newCh}]);
    setNewCh({id:'',name:'',category:'Educación',score:5,priority:3,enabled:true,shorts:false,description:''});
    setHandleInput(''); setShowAdd(false);
    showToast('Canal añadido','success');
  };

  const ChannelForm=({data,onChange,isEdit=false})=>(
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      {!isEdit&&(
        <div className="form-group" style={{gridColumn:'1/-1'}}>
          <label className="form-label">🔍 Buscar por @handle o ID</label>
          <div style={{display:'flex',gap:8}}>
            <input className="form-control" placeholder="@handle o UCxxxxxxxxxxxxxxx" value={handleInput}
              onChange={e=>{setHandleInput(e.target.value);setResolveError('');}}
              onKeyDown={e=>{if(e.key==='Enter')resolveHandle();}} style={{flex:1}}/>
            <button className="btn btn-secondary" onClick={resolveHandle} disabled={resolving}>
              {resolving?'⏳':'🔎 Resolver'}
            </button>
          </div>
          {resolveError&&<div style={{fontSize:12,color:'#EF4444',marginTop:6}}>{resolveError}</div>}
          {data.id&&<div style={{fontSize:11,color:'var(--dt-success)',marginTop:4}}>✓ ID: {data.id}</div>}
        </div>
      )}
      {isEdit&&<div className="form-group" style={{gridColumn:'1/-1'}}><label className="form-label">ID del Canal</label><input className="form-control" value={data.id} disabled style={{opacity:0.6,fontFamily:'monospace',fontSize:12}}/></div>}
      <div className="form-group"><label className="form-label">Nombre</label><input className="form-control" placeholder="Nombre del canal" value={data.name} onChange={e=>onChange({...data,name:e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Categoría</label><select className="form-select" value={data.category} onChange={e=>onChange({...data,category:e.target.value})}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
      <div className="form-group"><label className="form-label">Puntuación: {data.score}/10</label><input type="range" className="form-range" min={1} max={10} value={data.score} onChange={e=>onChange({...data,score:+e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Prioridad: {data.priority}</label><input type="range" className="form-range" min={1} max={5} value={data.priority} onChange={e=>onChange({...data,priority:+e.target.value})}/></div>
      <div className="form-group" style={{gridColumn:'1/-1'}}><label className="form-label">Descripción</label><input className="form-control" placeholder="Descripción breve" value={data.description} onChange={e=>onChange({...data,description:e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Estado</label><div style={{display:'flex',alignItems:'center',gap:10}}><Toggle checked={data.enabled} onChange={v=>onChange({...data,enabled:v})}/><span style={{fontSize:13}}>{data.enabled?'Activo':'Inactivo'}</span></div></div>
      <div className="form-group"><label className="form-label">Shorts</label><div style={{display:'flex',alignItems:'center',gap:10}}><Toggle checked={data.shorts} onChange={v=>onChange({...data,shorts:v})}/><span style={{fontSize:13}}>{data.shorts?'Habilitados':'Deshabilitados'}</span></div></div>
    </div>
  );

  return (
    <div>
      <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <input className="form-control" style={{flex:1,minWidth:200,height:38}} placeholder="🔍 Buscar canales..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <button className="btn btn-primary" onClick={()=>{setShowAdd(true);setHandleInput('');setNewCh({id:'',name:'',category:'Educación',score:5,priority:3,enabled:true,shorts:false,description:''});setResolveError('');}}>+ Añadir Canal</button>
      </div>
      <div className="dt-card" style={{overflow:'auto'}}>
        <table className="dt-table">
          <thead><tr><th>Canal</th><th>Categoría</th><th>Score</th><th>Shorts</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody>
            {filteredList.map(ch=>(
              <tr key={ch.id||ch.handle||ch.name}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    {ch.thumbnail?<img src={ch.thumbnail} style={{width:34,height:34,borderRadius:'50%',objectFit:'cover'}} onError={e=>{e.target.style.display='none';}}/>:<div className="ch-avatar" style={{width:34,height:34,fontSize:14,background:'var(--dt-primary)',color:'white'}}>{ch.name[0]}</div>}
                    <div><div style={{fontWeight:600,fontSize:13}}>{ch.name}</div><div style={{fontSize:11,color:'var(--dt-text3)'}}>{ch.id?(ch.id.slice(0,20)+'…'):ch.handle||'Sin ID'}</div></div>
                  </div>
                </td>
                <td><span className="badge badge-blue">{ch.category}</span></td>
                <td><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:60,height:4,background:'var(--dt-bg4)',borderRadius:2,overflow:'hidden'}}><div style={{width:`${ch.score*10}%`,height:'100%',background:'var(--dt-primary)'}}/></div><span style={{fontSize:12,fontWeight:600}}>{ch.score}</span></div></td>
                <td><span className={`badge ${ch.shorts?'badge-green':'badge-gray'}`}>{ch.shorts?'Sí':'No'}</span></td>
                <td><Toggle checked={ch.enabled} onChange={()=>setWhitelist(whitelist.map(c=>c.id===ch.id?{...c,enabled:!c.enabled}:c))}/></td>
                <td><div style={{display:'flex',gap:6}}><button className="btn btn-ghost btn-sm" onClick={()=>setEditCh({...ch})}>✏️</button><button className="btn btn-danger btn-sm" onClick={()=>{setWhitelist(whitelist.filter(c=>c.id!==ch.id));showToast('Canal eliminado','success');}}>🗑️</button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
        {filteredList.length===0&&<div style={{padding:32,textAlign:'center',color:'var(--dt-text3)'}}>No se encontraron canales</div>}
      </div>
      {showAdd&&(<div className="dt-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowAdd(false);}}><div className="dt-modal"><div className="dt-modal-header"><div className="dt-modal-title">➕ Añadir Canal</div><button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>✕</button></div><div className="dt-modal-body"><ChannelForm data={newCh} onChange={setNewCh} isEdit={false}/></div><div className="dt-modal-footer"><button className="btn btn-secondary" onClick={()=>setShowAdd(false)}>Cancelar</button><button className="btn btn-primary" onClick={addChannel}>Añadir Canal</button></div></div></div>)}
      {editCh&&(<div className="dt-overlay" onClick={e=>{if(e.target===e.currentTarget)setEditCh(null);}}><div className="dt-modal"><div className="dt-modal-header"><div className="dt-modal-title">✏️ Editar Canal</div><button className="btn btn-ghost btn-sm" onClick={()=>setEditCh(null)}>✕</button></div><div className="dt-modal-body"><ChannelForm data={editCh} onChange={setEditCh} isEdit={true}/></div><div className="dt-modal-footer"><button className="btn btn-secondary" onClick={()=>setEditCh(null)}>Cancelar</button><button className="btn btn-primary" onClick={()=>{setWhitelist(whitelist.map(c=>c.id===editCh.id?editCh:c));setEditCh(null);showToast('Canal actualizado','success');}}>Guardar</button></div></div></div>)}
    </div>
  );
}
