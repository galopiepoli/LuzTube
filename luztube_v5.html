// ADMIN STATS
// ═══════════════════════════════════════════════
function AdminStats() {
  const { history, whitelist } = useContext(AppContext);
  const barRef=useRef(null), pieRef=useRef(null), lineRef=useRef(null);
  const chartsRef=useRef({});

  const totalViews=history.length;
  const uniqueVideos=new Set(history.map(h=>h.videoId)).size;
  const topChannel=history.length?Object.entries(history.reduce((acc,h)=>{acc[h.channel]=(acc[h.channel]||0)+1;return acc;},{})).sort((a,b)=>b[1]-a[1])[0]?.[0]:'N/A';
  const channelCounts=history.reduce((acc,h)=>{acc[h.channel]=(acc[h.channel]||0)+1;return acc;},{});
  const top5=Object.entries(channelCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const catCounts=whitelist.reduce((acc,ch)=>{acc[ch.category]=(acc[ch.category]||0)+1;return acc;},{});
  const dayLabels=[],dayCounts=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dayLabels.push(d.toLocaleDateString('es-AR',{weekday:'short'}));dayCounts.push(history.filter(h=>new Date(h.watchedAt).toDateString()===d.toDateString()).length);}

  useEffect(()=>{
    const tc='#B3B3B3',gc='rgba(255,255,255,0.06)';
    if(barRef.current&&top5.length){if(chartsRef.current.bar)chartsRef.current.bar.destroy();chartsRef.current.bar=new Chart(barRef.current,{type:'bar',data:{labels:top5.map(x=>x[0]),datasets:[{data:top5.map(x=>x[1]),backgroundColor:'#E50914',borderRadius:6,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{display:false}},y:{ticks:{color:tc},grid:{color:gc}}}}});}
    if(pieRef.current&&Object.keys(catCounts).length){if(chartsRef.current.pie)chartsRef.current.pie.destroy();const colors=['#E50914','#3B82F6','#46D369','#FFD700','#FF6B35','#A855F7','#F97316'];chartsRef.current.pie=new Chart(pieRef.current,{type:'doughnut',data:{labels:Object.keys(catCounts),datasets:[{data:Object.values(catCounts),backgroundColor:colors,borderWidth:2,borderColor:'#1A1A1A'}]},options:{responsive:true,plugins:{legend:{labels:{color:tc,font:{size:12}}}}}});}
    if(lineRef.current){if(chartsRef.current.line)chartsRef.current.line.destroy();chartsRef.current.line=new Chart(lineRef.current,{type:'line',data:{labels:dayLabels,datasets:[{label:'Vistas',data:dayCounts,borderColor:'#E50914',backgroundColor:'rgba(229,9,20,0.1)',tension:0.4,fill:true,pointBackgroundColor:'#E50914',pointRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{color:gc}},y:{ticks:{color:tc},grid:{color:gc}}}}});}
    return()=>{Object.values(chartsRef.current).forEach(c=>c?.destroy());chartsRef.current={};};
  },[history.length,whitelist.length]);

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Total Vistas</div><div className="stat-value">{totalViews}</div></div>
        <div className="stat-card"><div className="stat-label">Videos Únicos</div><div className="stat-value">{uniqueVideos}</div></div>
        <div className="stat-card"><div className="stat-label">Canal Top</div><div className="stat-value" style={{fontSize:16,marginTop:4}}>{topChannel}</div></div>
        <div className="stat-card"><div className="stat-label">Canales Activos</div><div className="stat-value">{whitelist.filter(c=>c.enabled).length}<span style={{fontSize:14,color:'var(--dt-text3)'}}> / {whitelist.length}</span></div></div>
        <div className="stat-card"><div className="stat-label">Con Shorts</div><div className="stat-value">{whitelist.filter(c=>c.shorts&&c.enabled).length}</div></div>
        <div className="stat-card"><div className="stat-label">Score Prom.</div><div className="stat-value">{whitelist.length?Math.round(whitelist.reduce((s,c)=>s+c.score,0)/whitelist.length*10)/10:0}</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:24}}>
        <div className="dt-card"><div className="dt-card-header"><div className="dt-card-title">Canales más vistos</div></div><div className="dt-card-body" style={{height:220}}>{top5.length?<canvas ref={barRef}/>:<div style={{padding:40,textAlign:'center',color:'var(--dt-text3)'}}>Sin datos</div>}</div></div>
        <div className="dt-card"><div className="dt-card-header"><div className="dt-card-title">Por categoría</div></div><div className="dt-card-body" style={{height:220,display:'flex',alignItems:'center',justifyContent:'center'}}>{Object.keys(catCounts).length?<canvas ref={pieRef} style={{maxHeight:200}}/>:<div style={{color:'var(--dt-text3)'}}>Sin datos</div>}</div></div>
      </div>
      <div className="dt-card"><div className="dt-card-header"><div className="dt-card-title">Actividad — Últimos 7 días</div></div><div className="dt-card-body" style={{height:220}}><canvas ref={lineRef}/></div></div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// ADMIN SETTINGS — app config + change password
// ═══════════════════════════════════════════════
function AdminSettings() {
  const ctx = useContext(AppContext);
  const { config, setConfig, whitelist, history, showToast } = ctx;
  const [activeTab, setActiveTab] = useState('general');
  const update=(k,v)=>setConfig(prev=>({...prev,[k]:v}));

  // Change password state
  const [curPw, setCurPw] = useState('');
  const [newPw, setNewPw] = useState('');
  const [confirmPw, setConfirmPw] = useState('');
  const [pwError, setPwError] = useState('');
  const [showPws, setShowPws] = useState({cur:false,new:false,conf:false});

  const changePw=()=>{
    const cur=curPw.replace(/[<>"'`]/g,'').trim();
    const nw=newPw.replace(/[<>"'`]/g,'').trim();
    const cf=confirmPw.replace(/[<>"'`]/g,'').trim();
    if(cur!==auth.getPassword()){setPwError('Contraseña actual incorrecta');return;}
    if(nw.length<6){setPwError('Mínimo 6 caracteres');return;}
    if(nw!==cf){setPwError('Las contraseñas no coinciden');return;}
    auth.setPassword(nw);
    setCurPw('');setNewPw('');setConfirmPw('');setPwError('');
    showToast('✓ Contraseña cambiada exitosamente','success');
  };

  const exportData=()=>{
    const data={whitelist,history,config,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='luztube-backup.json';a.click();
    showToast('Backup exportado','success');
  };

  const importData=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.whitelist)ctx.setWhitelist(d.whitelist);if(d.config)setConfig(d.config);showToast('Datos importados','success');}catch{showToast('Error al importar','error');}};
    r.readAsText(file);
  };

  const tabs=[{id:'general',label:'General'},{id:'seguridad',label:'🔒 Seguridad'},{id:'datos',label:'💾 Datos'}];

  return (
    <div>
      <div className="dt-tabs">
        {tabs.map(t=><div key={t.id} className={`dt-tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</div>)}
      </div>

      {activeTab==='general'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,maxWidth:700}}>
          <div className="form-group" style={{gridColumn:'1/-1'}}>
            <label className="form-label">Nombre de la Aplicación</label>
            <input className="form-control" value={config.appName} onChange={e=>update('appName',e.target.value)}/>
          </div>
          <div className="form-group"><label className="form-label">Autoplay</label><div style={{display:'flex',alignItems:'center',gap:10}}><Toggle checked={config.autoplay} onChange={v=>update('autoplay',v)}/><span style={{fontSize:13}}>Reproducción automática</span></div></div>
          <div className="form-group"><label className="form-label">Shorts</label><div style={{display:'flex',alignItems:'center',gap:10}}><Toggle checked={config.shortsEnabled} onChange={v=>update('shortsEnabled',v)}/><span style={{fontSize:13}}>Sección Shorts activa</span></div></div>
          <div className="form-group"><label className="form-label">Siguiente automático</label><div style={{display:'flex',alignItems:'center',gap:10}}><Toggle checked={config.nextAutoplay} onChange={v=>update('nextAutoplay',v)}/><span style={{fontSize:13}}>Sugerir siguiente video</span></div></div>
        </div>
      )}

      {activeTab==='seguridad'&&(
        <div style={{maxWidth:420}}>
          <div className="dt-card">
            <div className="dt-card-header"><div className="dt-card-title">🔒 Cambiar Contraseña Admin</div></div>
            <div className="dt-card-body">
              <div style={{marginBottom:16,padding:'10px 14px',background:'rgba(59,130,246,0.08)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:8,fontSize:13,color:'var(--dt-info)'}}>
                ℹ️ La sesión admin no persiste. Deberás loguearte cada vez que abras la app.
              </div>
              {[
                {label:'Contraseña actual',val:curPw,set:setCurPw,field:'cur'},
                {label:'Nueva contraseña (mín. 6 caracteres)',val:newPw,set:setNewPw,field:'new'},
                {label:'Confirmar nueva contraseña',val:confirmPw,set:setConfirmPw,field:'conf'},
              ].map(f=>(
                <div key={f.field} className="form-group pw-wrap">
                  <label className="form-label">{f.label}</label>
                  <input
                    className="form-control"
                    type={showPws[f.field]?'text':'password'}
                    value={f.val}
                    onChange={e=>{f.set(e.target.value);setPwError('');}}
                    autoComplete="off"
                    style={{paddingRight:44}}
                  />
                  <button className="pw-toggle" onClick={()=>setShowPws(s=>({...s,[f.field]:!s[f.field]}))}>
                    {showPws[f.field]?'🙈':'👁'}
                  </button>
                </div>
              ))}
              {pwError&&<div style={{color:'#EF4444',fontSize:13,marginBottom:12}}>{pwError}</div>}
              <button className="btn btn-primary" onClick={changePw}>Cambiar Contraseña</button>
            </div>
          </div>
          <div className="dt-card" style={{marginTop:16}}>
            <div className="dt-card-header"><div className="dt-card-title">🛡️ Información de Seguridad</div></div>
            <div className="dt-card-body" style={{fontSize:13,color:'var(--dt-text2)',lineHeight:2}}>
              <div>✓ Sesión admin sin persistencia</div>
              <div>✓ Bloqueo tras {MAX_LOGIN_ATTEMPTS} intentos fallidos</div>
              <div>✓ Lockout de {LOCKOUT_SECONDS} segundos</div>
              <div>✓ API Key en storage separado</div>
              <div>✓ Sanitización de inputs sensibles</div>
            </div>
          </div>
        </div>
      )}

      {activeTab==='datos'&&(
        <div style={{maxWidth:500}}>
          <div className="dt-card" style={{marginBottom:16}}>
            <div className="dt-card-header"><div className="dt-card-title">Exportar / Importar</div></div>
            <div className="dt-card-body" style={{display:'flex',flexDirection:'column',gap:14}}>
              <button className="btn btn-secondary" onClick={exportData}>📤 Exportar backup completo (JSON)</button>
              <div><label className="form-label">📥 Importar backup</label><input type="file" accept=".json" onChange={importData} className="form-control"/></div>
            </div>
          </div>
          <div className="dt-card">
            <div className="dt-card-header"><div className="dt-card-title" style={{color:'#EF4444'}}>⚠️ Zona de peligro</div></div>
            <div className="dt-card-body" style={{display:'flex',flexDirection:'column',gap:12}}>
              <button className="btn btn-danger" onClick={()=>{ctx.clearHistory();showToast('Historial borrado','success');}}>🗑️ Borrar todo el historial</button>
              <button className="btn btn-danger" onClick={()=>{if(confirm('¿Restablecer configuración?')){setConfig(DEFAULT_CONFIG);showToast('Configuración restablecida','success');}}}>🔄 Restablecer configuración</button>
              <button className="btn btn-danger" onClick={()=>{if(confirm('¿Eliminar TODOS los datos? No se puede deshacer.')){localStorage.clear();fetch('/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lt_whitelist:null,lt_config:null,lt_history:null,lt_favorites:null})}).finally(()=>window.location.reload());}}}>💣 Borrar todos los datos</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  if (!logged) return <AdminLogin onLogin={()=>setLogged(true)}/>;

  const tabs=[
    {id:'dashboard',label:'📊 Dashboard'},
    {id:'whitelist',label:'📋 Whitelist'},
    {id:'stats',label:'📈 Estadísticas'},
    {id:'settings',label:'⚙️ Configuración'},
  ];

  return (
    <div className="dt-page admin-section">
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:28}}>
        <div style={{fontFamily:'var(--dt-font-display)',fontSize:30,color:'var(--dt-primary)'}}>PANEL ADMIN</div>
        <span className="badge badge-red">Acceso Restringido</span>
        <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={()=>setLogged(false)}>
          🚪 Cerrar Sesión
        </button>
      </div>

        {tabs.map(t=><div key={t.id} className={`dt-tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</div>)}
      </div>
      {activeTab==='dashboard'&&<AdminDashboard/>}
      {activeTab==='whitelist'&&<AdminWhitelist/>}
      {activeTab==='stats'&&<AdminStats/>}
      {activeTab==='settings'&&<AdminSettings/>}
    </div>
  );
}

// PROFILE SELECTOR — Netflix-style full screen
// ═══════════════════════════════════════════════
function ProfileSelector({ onSelect, onCreate, onEdit, onDelete }) {
  const [profiles, setProfiles] = useState(() => profileManager.getProfiles());
  const [showCreate, setShowCreate] = useState(false);
  const [editProfile, setEditProfile] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  useEffect(() => {
    const unsub = profileManager.onChange((p) => setProfiles([...p]));
    return unsub;
  }, []);

  return (
    <div style={{
      position:'fixed',inset:0,zIndex:9999,
      background:'linear-gradient(135deg,#0A0A0A 0%,#1A0A20 50%,#0A0A1E 100%)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      padding:24,animation:'fadeIn 0.3s ease'
    }}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:48,letterSpacing:2,color:'var(--dt-primary)',marginBottom:8}}>LUZTUBE</div>
      <div style={{fontSize:22,fontWeight:600,color:'#fff',marginBottom:32}}>¿Quién está mirando?</div>
      <div style={{display:'flex',gap:20,flexWrap:'wrap',justifyContent:'center',maxWidth:700}}>
        {profiles.map(p => (
          <div key={p.id} style={{textAlign:'center',cursor:'pointer',transition:'transform 0.2s'}}
            onClick={() => { onSelect(p.id); }}
            onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.08)'}
            onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
          >
            <ProfileAvatar profile={p} size={100} />
            <div style={{marginTop:10,fontSize:14,fontWeight:500,color:'#ccc'}}>{p.name}</div>
            <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:6}}>
              <button className="btn btn-ghost btn-sm" onClick={e => { e.stopPropagation(); setEditProfile(p); }}
                style={{fontSize:11,color:'#888',padding:'4px 8px'}}>✏️</button>
              <button className="btn btn-ghost btn-sm" onClick={e => { e.stopPropagation(); setConfirmDelete(p); }}
                style={{fontSize:11,color:'#EF4444',padding:'4px 8px'}}>🗑️</button>
            </div>
          </div>
        ))}
        <div style={{textAlign:'center',cursor:'pointer'}} onClick={() => setShowCreate(true)}>
          <div style={{
            width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,0.08)',
            border:'3px dashed rgba(255,255,255,0.25)',display:'flex',alignItems:'center',
            justifyContent:'center',fontSize:36,color:'rgba(255,255,255,0.4)',transition:'all 0.2s'
          }}
            onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.15)'; e.currentTarget.style.color = '#fff'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.08)'; e.currentTarget.style.color = 'rgba(255,255,255,0.4)'; }}
          >+</div>
          <div style={{marginTop:10,fontSize:14,fontWeight:500,color:'#888'}}>Agregar perfil</div>
        </div>
      </div>
      {showCreate && <ProfileEditor onClose={() => setShowCreate(false)} onSave={(data) => { onCreate(data); setShowCreate(false); }} />}
      {editProfile && <ProfileEditor profile={editProfile} onClose={() => setEditProfile(null)} onSave={(data) => { onEdit(editProfile.id, data); setEditProfile(null); }} />}
      {confirmDelete && (
        <div className="dt-overlay" onClick={() => setConfirmDelete(null)}>
          <div className="dt-modal" style={{maxWidth:400}}>
            <div className="dt-modal-body" style={{textAlign:'center',padding:32}}>
              <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
              <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>Eliminar "{confirmDelete.name}"?</div>
              <div style={{fontSize:13,color:'var(--dt-text3)',marginBottom:20}}>Se borrarán el historial, favoritos y configuraciones de este perfil.</div>
              <div style={{display:'flex',gap:12,justifyContent:'center'}}>
                <button className="btn btn-secondary" onClick={() => setConfirmDelete(null)}>Cancelar</button>
                <button className="btn btn-danger" onClick={() => { onDelete(confirmDelete.id); setConfirmDelete(null); }}>Eliminar</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// PROFILE AVATAR
// ═══════════════════════════════════════════════
function ProfileAvatar({ profile, size = 44, onClick }) {
  const [src, setSrc] = useState(null);
  useEffect(() => { profileManager.getAvatar(profile?.id).then(setSrc); }, [profile?.id]);

  const style = {
    width: size, height: size, borderRadius: '50%', objectFit: 'cover', flexShrink: 0,
    border: `3px solid ${profile?.color || '#333'}`,
    cursor: onClick ? 'pointer' : 'default',
    transition: 'all 0.2s',
  };

  if (src) return <img src={src} alt="" style={style} onClick={onClick} />;
  return (
    <div style={{
      ...style, background: profile?.color || '#E50914', display: 'flex',
      alignItems: 'center', justifyContent: 'center', border: `3px solid ${profile?.color || '#333'}`,
      fontWeight: 700, fontSize: size * 0.4, color: '#fff'
    }} onClick={onClick}>
      {(profile?.name || '?')[0].toUpperCase()}
    </div>
  );
}

// ═══════════════════════════════════════════════
// PROFILE EDITOR (Create / Edit)
// ═══════════════════════════════════════════════
function ProfileEditor({ profile, onClose, onSave }) {
  const [name, setName] = useState(profile?.name || '');
  const [desc, setDesc] = useState(profile?.description || '');
  const [color, setColor] = useState(profile?.color || '#E50914');
  const [theme, setTheme] = useState(profile?.theme || 'dark');
  const [avatarFile, setAvatarFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const previewUrlRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (previewUrlRef.current) { URL.revokeObjectURL(previewUrlRef.current); }
    const url = URL.createObjectURL(file);
    previewUrlRef.current = url;
    setAvatarFile(file);
    setPreview(url);
    e.target.value = '';
  };

  useEffect(() => () => { if (previewUrlRef.current) URL.revokeObjectURL(previewUrlRef.current); }, []);

  const save = async () => {
    if (!name.trim()) return;
    const data = { name: name.trim(), description: desc.trim(), color, theme };
    onSave(data);
    if (avatarFile) {
      try {
        const processed = await avatarProcessor.process(avatarFile);
        const id = profile ? profile.id : profileManager.getActiveId();
        if (id) await profileManager.saveAvatar(id, processed);
      } catch (e) {
        alert('Error al procesar la foto: ' + e.message);
      }
    }
  };

  const colors = ['#E50914','#FF6B35','#FFD700','#46D369','#3B82F6','#A855F7','#FF2D78','#00F5FF','#FFE600','#FF4081','#C0A050','#7B2FFF'];

  return (
    <div className="dt-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="dt-modal" style={{maxWidth:480}}>
        <div className="dt-modal-header">
          <div className="dt-modal-title">{profile ? 'Editar Perfil' : 'Crear Perfil'}</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="dt-modal-body">
          <div style={{textAlign:'center',marginBottom:20}}>
            <div style={{position:'relative',display:'inline-block'}}>
              {preview ? (
                <img src={preview} alt="" style={{width:88,height:88,borderRadius:'50%',objectFit:'cover',border:`3px solid ${color}`}} />
              ) : (
                <div style={{width:88,height:88,borderRadius:'50%',background:color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,fontWeight:700,color:'#fff',border:`3px solid ${color}`}}>
                  {(name || '?')[0].toUpperCase()}
                </div>
              )}
              <label style={{position:'absolute',bottom:0,right:0,width:30,height:30,borderRadius:'50%',background:'var(--dt-bg4)',border:'2px solid var(--dt-bg2)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14}}>
                📷<input type="file" accept="image/*,image/heic,image/heif" onChange={handleFile} style={{display:'none'}}/>
              </label>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Nombre</label>
            <input className="form-control" value={name} onChange={e => setName(e.target.value)} placeholder="Nombre del perfil" maxLength={30} />
          </div>
          <div className="form-group">
            <label className="form-label">Descripción</label>
            <input className="form-control" value={desc} onChange={e => setDesc(e.target.value)} placeholder="Breve descripción" maxLength={100} />
          </div>
          <div className="form-group">
            <label className="form-label">Color favorito</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {colors.map(c => (
                <div key={c} onClick={() => setColor(c)} style={{
                  width:32,height:32,borderRadius:'50%',background:c,cursor:'pointer',
                  border: color === c ? '3px solid #fff' : '3px solid transparent',
                  boxShadow: color === c ? `0 0 12px ${c}` : 'none', transition:'all 0.15s'
                }} />
              ))}
              <input type="color" value={color} onChange={e => setColor(e.target.value)}

// PROFILE SETTINGS PAGE

function ProfileSettingsPage() {
  const { createProfile } = useContext(AppContext);
  const [profiles, setProfiles] = useState(() => profileManager.getProfiles());
  const [activeId, setActiveId] = useState(() => profileManager.getActiveId());
  const [editProfile, setEditProfile] = useState(null);
  const [wallpaperFile, setWallpaperFile] = useState(null);
  const [wallpaperPreview, setWallpaperPreview] = useState(null);
  const [wallpaperMode, setWallpaperMode] = useState('cover');
  const [showFontManager, setShowFontManager] = useState(false);
  const [showCreateProfile, setShowCreateProfile] = useState(false);
  const wpPreviewRef = useRef(null);

  useEffect(() => {
    const unsub = profileManager.onChange((p, a) => { setProfiles([...p]); setActiveId(a); });
    return () => { unsub(); if (wpPreviewRef.current) URL.revokeObjectURL(wpPreviewRef.current); };
  }, []);

  const active = profiles.find(p => p.id === activeId);

  const handleWallpaper = async () => {
    if (!wallpaperFile || !active) return;
    try {
      const result = await wallpaperProcessor.process(wallpaperFile, { mode: wallpaperMode });
      await profileManager.saveWallpaper(active.id, result);
      if (wpPreviewRef.current) { URL.revokeObjectURL(wpPreviewRef.current); wpPreviewRef.current = null; }
      setWallpaperFile(null);
      setWallpaperPreview(null);
    } catch (e) {
      alert('Error al procesar el wallpaper: ' + e.message);

  };

  const removeWallpaper = async () => {
    if (!active) return;
    await idb.del("wallpapers", active.id);
    profileManager.update(active.id, { wallpaper: null });
    if (wpPreviewRef.current) { URL.revokeObjectURL(wpPreviewRef.current); wpPreviewRef.current = null; }
    setWallpaperPreview(null);

  const switchProfile = (id) => {
    profileManager.switchTo(id);

    <div className="dt-page">

        {profiles.map(p => (
          <div key={p.id} className={`stat-card`} style={{

          }} onClick={() => switchProfile(p.id)}>

            {p.id === activeId && <div className="badge badge-green" style={{marginTop:6}}>Activo</div>}

            <div className="dt-card-body">

// FONT MANAGER PANEL
// ═══════════════════════════════════════════════
function FontManagerPanel({ onClose }) {
  const [fonts, setFonts] = useState([]);
  const [installing, setInstalling] = useState(false);

  useEffect(() => { fontManager.list().then(setFonts); }, []);

  const install = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setInstalling(true);
    try {
      const font = await fontManager.install(file);
      setFonts(prev => [...prev, font]);
    } catch (err) {
      alert(err.message);
    }
    setInstalling(false);
    e.target.value = '';
  };

  const toggle = async (id) => {
    await fontManager.toggle(id);
    setFonts(await fontManager.list());
  };

  const remove = async (id) => {
    await fontManager.remove(id);
    setFonts(await fontManager.list());
  };

  return (
    <div className="dt-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="dt-modal" style={{maxWidth:560}}>
        <div className="dt-modal-header">
          <div className="dt-modal-title">🔤 Gestor de Fuentes</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="dt-modal-body">
          <div style={{marginBottom:20}}>
            <label className="btn btn-primary" style={{cursor:'pointer'}}>
              {installing ? '⏳ Instalando...' : '📥 Subir fuente'}<input type="file" accept=".ttf,.otf,.woff,.woff2" onChange={install} style={{display:'none'}} disabled={installing} />
            </label>
            <div style={{fontSize:11,color:'var(--dt-text3)',marginTop:6}}>Formatos: TTF, OTF, WOFF, WOFF2</div>
          </div>
          {fonts.length === 0 ? (
            <div className="empty-state" style={{padding:'32px 0'}}>
              <div className="empty-icon" style={{fontSize:36}}>🔤</div>
              <div className="empty-title" style={{fontSize:14}}>Sin fuentes instaladas</div>
              <div className="empty-sub" style={{fontSize:12}}>Subí un archivo de fuente para empezar</div>

          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {fonts.map(f => (
                <div key={f.id} className="dt-card" style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px'}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,fontFamily:f.active ? f.name : 'inherit'}}>{f.name}</div>
                    <div style={{fontSize:11,color:'var(--dt-text3)'}}>.{f.ext} · {(f.size / 1024).toFixed(1)}KB · {new Date(f.installedAt).toLocaleDateString()}</div>
                  </div>
                  <Toggle checked={f.active} onChange={() => toggle(f.id)} />

                </div>
              ))}

          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════
function App() {
  const [whitelist, setWhitelistRaw] = useState(()=>storage.get('lt_whitelist',DEFAULT_WHITELIST));
  const [config, setConfigRaw] = useState(()=>storage.get('lt_config',DEFAULT_CONFIG));
  const [profilesReady, setProfilesReady] = useState(false);
  const [profiles, setProfiles] = useState([]);
  const [activeProfile, setActiveProfile] = useState(null);
  const [currentPage, setCurrentPage] = useState('home');
  const [searchQuery, setSearchQuery] = useState('');
  const [searchInput, setSearchInput] = useState('');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
  const [toasts, setToasts] = useState([]);

  const profileHistory = activeProfile?.history || [];
  const profileFavorites = activeProfile?.favorites || [];

  // Init: load server data, run migration, init profiles
  useEffect(() => {
    (async () => {
      const serverData = await serverStorage.loadAll();
      if (serverData) {
        if (serverData.lt_whitelist) setWhitelistRaw(serverData.lt_whitelist);
        if (serverData.lt_config) setConfigRaw(c => ({ ...DEFAULT_CONFIG, ...c, ...serverData.lt_config }));
      }
      await migrationManager.run(serverData);
      await profileManager.init(serverData);
      const p = profileManager.getProfiles();
      const active = profileManager.getActive();
      setProfiles(p);
      setActiveProfile(active);
      setProfilesReady(true);
      statsTracker.startSession();
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Subscribe to profile changes
  useEffect(() => {
    const unsub = profileManager.onChange((p, a) => {
      setProfiles([...p]);
      setActiveProfile(profileManager.getActive());
    });
    return unsub;
  }, []);

  // Persist whitelist & config
  const setWhitelist = useCallback(v => { setWhitelistRaw(v); storage.set('lt_whitelist', v); serverStorage.save('lt_whitelist', v); }, []);
  const setConfig = useCallback(v => { setConfigRaw(v); storage.set('lt_config', v); serverStorage.save('lt_config', v); }, []);

  const showToast = useCallback((message, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  const addHistory = useCallback((video) => {
    if (!activeProfile) return;
    const videoId = getVideoId(video);
    if (!videoId) return;
    const title = video.snippet?.title || '';
    const channel = video.snippet?.channelTitle || '';
    const thumb = video.snippet?.thumbnails?.medium?.url || '';
    const channelId = video.snippet?.channelId || '';
    const category = whitelist.find(c => c.id === channelId)?.category || '';
    const history = profileManager.getProfileData(activeProfile.id, 'history') || [];
    const existing = history.findIndex(h => h.videoId === videoId);
    if (existing >= 0) {
      history[existing] = { ...history[existing], count: (history[existing].count || 1) + 1, watchedAt: new Date().toISOString() };
    } else {
      history.unshift({ videoId, title, channel, thumb, watchedAt: new Date().toISOString(), count: 1 });
      if (history.length > 500) history.length = 500;
    }
    profileManager.setProfileData(activeProfile.id, 'history', history);
    serverStorage.saveImmediate(`profile_${activeProfile.id}_history`, history);
    statsTracker.track(activeProfile.id, 'watch', { channelId, category, duration: 0 });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeProfile, whitelist]);

  const clearHistory = useCallback(() => {
    if (!activeProfile) return;
    profileManager.setProfileData(activeProfile.id, 'history', []);
  }, [activeProfile]);

  const toggleFavorite = useCallback((video) => {
    if (!activeProfile) return;
    const vid = getVideoId(video);
    const favs = profileManager.getProfileData(activeProfile.id, 'favorites') || [];
    const idx = favs.findIndex(f => getVideoId(f) === vid);
    if (idx >= 0) { favs.splice(idx, 1); } else { favs.push(video); }
    profileManager.setProfileData(activeProfile.id, 'favorites', favs);
  }, [activeProfile]);

  // Profile actions
  const createProfile = useCallback((data) => {
    const p = profileManager.create(data);
    if (p) {
      activityLogger.log("profile_created", { name: p.name });
      if (data.avatarDataUrl) profileManager.saveAvatar(p.id, data.avatarDataUrl);
    }
  }, []);

  const editProfile = useCallback((id, data) => {
    profileManager.update(id, data);
    activityLogger.log("profile_edited", { id, ...data });
  }, []);

  const deleteProfile = useCallback((id) => {
    profileManager.remove(id);
    idb.del("avatars", id);
    idb.del("wallpapers", id);
    activityLogger.log("profile_deleted", { id });
  }, []);

  const selectProfile = useCallback((id) => {
    profileManager.switchTo(id);
    setActiveProfile(profileManager.getActive());
    statsTracker.startSession();
    activityLogger.log("profile_login", { profileId: id });
  }, []);

  const logout = useCallback(() => {
    if (activeProfile?.id) {
      activityLogger.log("profile_logout", { profileId: activeProfile.id });
      statsTracker.track(activeProfile.id, 'session_end', {});
    }
    storage.set("lt_active_profile", "");
    setActiveProfile(null);
    setCurrentPage('home');
  }, [activeProfile]);

  // Apply config + profile wallpaper to CSS
  useEffect(() => {
    if (!activeProfile) return;
    const mergedConfig = profileManager.getMergedConfig(activeProfile.id);
    const c = { ...config, ...mergedConfig };
    const r = document.documentElement;
    if (c.primaryColor) r.style.setProperty('--dt-primary', c.primaryColor);
    if (c.bgColor) r.style.setProperty('--dt-bg', c.bgColor);
    if (c.bgColor2) r.style.setProperty('--dt-bg2', c.bgColor2);
    if (c.cardColor) r.style.setProperty('--dt-surface', c.cardColor);
    if (c.sidebarColor) r.style.setProperty('--dt-sidebar-bg', c.sidebarColor);
    if (c.textColor) r.style.setProperty('--dt-text', c.textColor);
    if (c.secondaryColor) r.style.setProperty('--dt-secondary', c.secondaryColor);
    if (c.accentColor) r.style.setProperty('--dt-accent', c.accentColor);
    if (c.thumbSize) r.style.setProperty('--dt-thumb-size', `${c.thumbSize}px`);
    if (c.borderRadius) r.style.setProperty('--dt-card-radius', `${c.borderRadius}px`);
    if (c.fontFamily) r.style.setProperty('--dt-font', `'${c.fontFamily}', sans-serif`);
    if (c.fontSize) document.body.style.fontSize = `${c.fontSize}px`;
    if (c.letterSpacing) r.style.setProperty('letter-spacing', `${c.letterSpacing}px`);
    if (c.zoomUI) r.style.setProperty('--dt-zoom', c.zoomUI);
    if (c.backgroundBlur) r.style.setProperty('--dt-blur-intensity', `${c.backgroundBlur}px`);
    document.title = c.appName || 'LuzTube';
    const body = document.body;
    ['theme-light','theme-oled','theme-netflix','theme-synthwave','theme-vaporwave',
     'theme-minimal','theme-glassmorphism','theme-retro','theme-cyberpunk','theme-kids',
     'effects-glow','effects-shadows','no-animations','kids-mode'].forEach(cls => body.classList.remove(cls));
    if (c.theme && c.theme !== 'dark') body.classList.add(`theme-${c.theme}`);
    if (c.glowEffects) body.classList.add('effects-glow');
    if (c.shadowEffects) body.classList.add('effects-shadows');
    if (!c.animationsEnabled) body.classList.add('no-animations');
    if (c.kidsMode) body.classList.add('kids-mode');
    if (c.roundedUI) r.style.setProperty('--dt-card-radius', '20px');
    if (c.gradientBg) body.style.background = 'linear-gradient(135deg,var(--dt-bg) 0%,var(--dt-bg3) 50%,var(--dt-bg) 100%)';
    else body.style.background = '';
    // Apply wallpaper
    (async () => {
      const wp = activeProfile?.wallpaper ? await profileManager.getWallpaper(activeProfile.id) : null;
      if (wp) {
        if (wp.mode === 'tile') r.style.setProperty('--dt-bg-image', `url("${wp.dataUrl}")`);
        else r.style.setProperty('--dt-bg-image', `url("${wp.dataUrl}")`);
        body.style.backgroundSize = wp.mode === 'cover' ? 'cover' : wp.mode === 'contain' ? 'contain' : wp.mode === 'stretch' ? '100% 100%' : 'auto';
        body.style.backgroundAttachment = 'fixed';
        body.style.backgroundPosition = 'center';
        body.style.backgroundRepeat = wp.mode === 'tile' ? 'repeat' : 'no-repeat';
        if (wp.darken > 0) body.style.boxShadow = `inset 0 0 0 9999px rgba(0,0,0,${wp.darken / 100})`;
      } else if (!c.backgroundImage) {
        r.style.setProperty('--dt-bg-image', 'none');
        body.style.background = '';
        body.style.boxShadow = 'none';
      }
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeProfile, config]);

  // Sync API key
  useEffect(() => {
    const storedKey = apiKeyStore.get();
    if (storedKey && !config.youtubeApiKey) setConfig(prev => ({ ...prev, youtubeApiKey: storedKey }));
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const navigate = useCallback((page) => { setCurrentPage(page); setMobileSidebarOpen(false); }, []);
  const doSearch = () => {
    if (!searchInput.trim()) return;
    setSearchQuery(searchInput.trim()); navigate('search');
    if (activeProfile) statsTracker.track(activeProfile.id, 'search');
  };
  const isActive = (page) => currentPage === page;

  // Show profile selector until one is selected
  if (!profilesReady) {
    return <div style={{position:'fixed',inset:0,background:'#0A0A0A',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:44,height:44,border:'4px solid #333',borderTop:'4px solid var(--dt-primary)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}} />
    </div>;
  }

  if (!activeProfile && profiles.length === 0) {
    return <ProfileSelector
      profiles={[]}
      onSelect={() => {}}
      onCreate={createProfile}
      onEdit={editProfile}
      onDelete={deleteProfile}
    />;
  }

  if (!activeProfile) {
    return <ProfileSelector
      onSelect={selectProfile}
      onCreate={createProfile}
      onEdit={editProfile}
      onDelete={deleteProfile}
    />;
  }

  const navItems = [
    { id: 'home', icon: '🏠', label: 'Inicio' },
    { id: 'channels', icon: '📺', label: 'Canales' },
    ...(config.shortsEnabled ? [{ id: 'shorts', icon: '⚡', label: 'Shorts' }] : []),
    { id: 'favorites', icon: '⭐', label: 'Favoritos', badge: profileFavorites.length || null },
    { id: 'history', icon: '🕐', label: 'Historial' },
  ];

  // Also expose profile data through context for backward-compatible components
  const ctx = {
    whitelist, setWhitelist,
    config, setConfig,
    history: profileHistory, addHistory, clearHistory,
    favorites: profileFavorites, toggleFavorite,
    showToast, navigate,
    activeProfile, profiles, selectProfile, createProfile, logout,
  };

  const sidebarCls = `dt-sidebar ${sidebarCollapsed ? 'collapsed' : ''} ${mobileSidebarOpen ? 'mobile-open' : ''}`;
  const topbarCls = `dt-topbar ${sidebarCollapsed ? 'sidebar-collapsed' : ''}`;
  const mainCls = `dt-main ${sidebarCollapsed ? 'sidebar-collapsed' : ''}`;

  return (
    <AppContext.Provider value={ctx}>
      <aside className={sidebarCls}>
        <div className="dt-logo">
          <div className="dt-logo-icon">{config.logoEmoji}</div>
          {!sidebarCollapsed && <div className="dt-logo-text">{config.appName}</div>}
        </div>
        <nav className="dt-nav">
          <div className="dt-nav-section">
            {!sidebarCollapsed && <div className="dt-nav-label">Menú</div>}
            {navItems.map(item => (
              <div key={item.id} className={`dt-nav-item ${isActive(item.id) ? 'active' : ''}`} onClick={() => navigate(item.id)}>
                <span className="dt-nav-icon">{item.icon}</span>
                {!sidebarCollapsed && <span>{item.label}</span>}
                {!sidebarCollapsed && item.badge && <span className="dt-nav-badge">{item.badge}</span>}
              </div>
            ))}
          </div>
          <hr style={{ border: 'none', borderTop: '1px solid var(--dt-border)', margin: '4px 8px 12px' }} />
          <div className="dt-nav-section">
            {!sidebarCollapsed && <div className="dt-nav-label">Herramientas</div>}
            <div className={`dt-nav-item api-section ${isActive('api') ? 'active' : ''}`} onClick={() => navigate('api')}>
              <span className="dt-nav-icon">🔑</span>
              {!sidebarCollapsed && <span>Conexión YouTube</span>}
              {!sidebarCollapsed && (
                <span style={{ marginLeft: 'auto' }}><span className={`api-dot ${apiKeyStore.get() ? 'api-dot-ok' : 'api-dot-unknown'}`} /></span>
              )}
            </div>
            <div className={`dt-nav-item ${isActive('customize') ? 'active' : ''}`} onClick={() => navigate('customize')}>
              <span className="dt-nav-icon">🎨</span>
              {!sidebarCollapsed && <span>Personalizar</span>}
            </div>
            <div className={`dt-nav-item ${isActive('profiles') ? 'active' : ''}`} onClick={() => navigate('profiles')}>
              <span className="dt-nav-icon">👤</span>
              {!sidebarCollapsed && <span>Mis Perfiles</span>}
            </div>
          </div>
          <hr style={{ border: 'none', borderTop: '1px solid var(--dt-border)', margin: '4px 8px 12px' }} />
          <div className="dt-nav-section admin-section">
            {!sidebarCollapsed && <div className="dt-nav-label">Admin</div>}
            <div className={`dt-nav-item ${isActive('admin') ? 'active' : ''}`} onClick={() => navigate('admin')}>
              <span className="dt-nav-icon">🔐</span>
              {!sidebarCollapsed && <span>Panel Admin</span>}
            </div>
          </div>
        </nav>
        {!sidebarCollapsed && (
          <div style={{ padding: '12px 16px', borderTop: '1px solid var(--dt-border)', fontSize: 11, color: 'var(--dt-text3)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
              <ProfileAvatar profile={activeProfile} size={24} />
              <span style={{ fontWeight: 600, fontSize: 12 }}>{activeProfile.name}</span>
              <button className="btn btn-ghost btn-xs" style={{ marginLeft: 'auto', fontSize: 10 }} onClick={logout}>🚪</button>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>✅ {whitelist.filter(c => c.enabled).length} canales activos</span>
              <button className="btn btn-ghost btn-xs" style={{fontSize:10}} onClick={() => navigate('profiles')}>➕ Perfil</button>
            </div>
          </div>
        )}
      </aside>

      {mobileSidebarOpen && <div onClick={() => setMobileSidebarOpen(false)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 99 }} />}

      <header className={topbarCls}>
        <button className="dt-icon-btn" onClick={() => { if (window.innerWidth < 768) setMobileSidebarOpen(s => !s); else setSidebarCollapsed(s => !s); }}>☰</button>
        <div className="dt-search-wrap">
          <input className="dt-search-input" placeholder={`Buscar en ${config.appName}...`} value={searchInput}
            onChange={e => setSearchInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') doSearch(); }} />
          <button className="dt-search-btn" onClick={doSearch}>🔍</button>
        </div>
        <div className="dt-topbar-actions">
          <button className="dt-icon-btn" title="Perfiles" onClick={() => navigate('profiles')}>
            <ProfileAvatar profile={activeProfile} size={28} />
          </button>
          <button className="dt-icon-btn" title="Cerrar sesión" onClick={logout}>🚪</button>
          <button className="dt-icon-btn" title="Favoritos" onClick={() => navigate('favorites')}>⭐</button>
          <button className="dt-icon-btn" title="Historial" onClick={() => navigate('history')}>🕐</button>
          <button className="dt-icon-btn" title="Personalizar" onClick={() => navigate('customize')}>🎨</button>
          <button className="dt-icon-btn" title="Conexión YouTube" onClick={() => navigate('api')}>
            🔑<span style={{ position: 'absolute', top: 8, right: 8, width: 6, height: 6, borderRadius: '50%', background: apiKeyStore.get() ? 'var(--dt-success)' : 'var(--dt-text3)' }} />
          </button>
        </div>
      </header>

      <main className={mainCls}>
        {currentPage === 'home' && <HomePage />}
        {currentPage === 'search' && <SearchPage query={searchQuery} />}
        {currentPage === 'channels' && <ChannelsPage />}
        {currentPage === 'shorts' && <ShortsPage />}
        {currentPage === 'favorites' && <FavoritesPage />}
        {currentPage === 'history' && <HistoryPage />}
        {currentPage === 'api' && <ApiPage />}
        {currentPage === 'customize' && <CustomizePage />}
        {currentPage === 'profiles' && <ProfileSettingsPage />}
        {currentPage === 'admin' && <AdminPage />}
      </main>

      <ToastContainer toasts={toasts} removeToast={id => setToasts(t => t.filter(x => x.id !== id))} />
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
