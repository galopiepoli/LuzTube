<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }
    #error {
      display: none;
      position: absolute; inset: 0;
      background: #0a0a0a;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 32px; text-align: center;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #fff;
    }
    #error.visible { display: flex; }
    #error h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    #error p { font-size: 13px; color: #aaa; max-width: 360px; line-height: 1.6; }
    #error a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; background: #E50914; color: #fff;
      border-radius: 8px; font-weight: 600; font-size: 14px;
      text-decoration: none; margin-top: 8px;
    }
  </style>
</head>
<body>

<iframe
  id="yt"
  referrerpolicy="strict-origin-when-cross-origin"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture; accelerometer; gyroscope"
  allowfullscreen
></iframe>

<div id="error">
  <div style="font-size:40px">🚫</div>
  <div>
    <h2>Este video no permite reproducción embebida</h2>
    <p>El canal desactivó el embed externo. Podés verlo directamente en YouTube.</p>
    <a id="yt-link" href="#" target="_blank" rel="noopener noreferrer">▶ Abrir en YouTube</a>
  </div>
</div>

<script>
  // Recibir el videoId desde el padre via postMessage
  window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'play') return;
    var videoId = e.data.videoId;
    if (!videoId) return;

    var iframe = document.getElementById('yt');
    var errorDiv = document.getElementById('error');
    var ytLink = document.getElementById('yt-link');

    errorDiv.classList.remove('visible');
    ytLink.href = 'https://www.youtube.com/watch?v=' + videoId;

    // URL limpia: sin origin, sin enablejsapi — solo lo esencial
    iframe.src = 'https://www.youtube-nocookie.com/embed/' + videoId
      + '?autoplay=1&rel=0&modestbranding=1&fs=1&playsinline=1';
  });

  // Escuchar errores del player de YouTube
  window.addEventListener('message', function(e) {
    if (!e.origin || !e.origin.includes('youtube')) return;
    try {
      var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
      // onError con código 101 o 150 = embedding deshabilitado por el canal
      if (data && data.event === 'onError') {
        document.getElementById('error').classList.add('visible');
      }
    } catch(_) {}
  });
</script>
</body>
</html>
